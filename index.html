<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>志木Go map</title>

  <meta property="og:title" content="志木Go map">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png?v=2026">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/?v=1">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="志木Go map">
  <meta property="og:locale" content="ja_JP">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png?v=2026">

  <link rel="apple-touch-icon" href="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png">
  <link rel="icon" href="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png">

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #f2f5f8; overflow: hidden; }
    #appFrame { width: 100%; height: 100dvh; border: none; display: block; }
    .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #777; background: #f2f5f8; z-index: 1; }
  </style>
</head>
<body>
  <div id="loading" class="loading">読み込み中...</div>
  <iframe id="appFrame" title="志木Go map" allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec";
    
    // 現在のURLパラメータを取得
    const params = new URLSearchParams(window.location.search);
    
    // Facebookのキャッシュ対策として、シェア用URLに ?v=1 が付いていなければリダイレクト
    if (!params.has('v')) {
      params.set('v', '1');
      window.history.replaceState(null, null, "?" + params.toString());
    }

    // 地図アプリの読み込み
    const iframeUrl = GAS_URL + "?" + params.toString();
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    frame.onload = function() {
      loading.style.display = "none";
    };
    frame.src = iframeUrl;
  </script>
</body>
</html>
