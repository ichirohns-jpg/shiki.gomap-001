<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>志木キッチンカー GO MAP</title>

  <meta property="og:title" content="志木キッチンカー GO MAP">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1200">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    /* 1. デザイン: 文字大きめ・モバイル最適化 */
    body { font-family: sans-serif; background: #f2f5f8; margin: 0; padding: 0; color: #333; }
    .header { width: 100%; max-width: 800px; margin: 0 auto; background: white; }
    .banner { width: 100%; height: auto; display: block; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px 15px; }
    
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 5px solid #004ea2; margin-bottom: 25px; }
    .media { width: 100%; height: 300px; background: #000; }
    .media img, .media iframe { width: 100%; height: 100%; object-fit: cover; border: none; }
    
    .p-20 { padding: 20px; }
    .shop-name { font-size: 24px; font-weight: bold; color: #004ea2; margin-bottom: 8px; }
    .loc { background: #fff3e0; color: #e65100; padding: 6px 12px; border-radius: 5px; font-size: 18px; font-weight: bold; display: inline-block; margin-bottom: 12px; }
    .msg { font-size: 18px; line-height: 1.8; color: #555; white-space: pre-wrap; }
    
    .bottom-actions { display: flex; gap: 10px; padding: 20px 15px 40px; max-width: 1000px; margin: 0 auto; }
    .btn { flex: 1; padding: 18px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
    .copy-btn { background: #eee; color: #333; }
    .map-btn { background: #004ea2; color: white; display: block; margin-top: 15px; }
  </style>
</head>
<body>

<div class="header">
  <img src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1200" class="banner">
</div>

<div class="container" id="list">
  <p style="text-align:center; padding:50px; color:#999;">読み込み中...</p>
</div>

<div class="bottom-actions">
  <button class="btn copy-btn" onclick="copyUrl()">🔗 リンクをコピー</button>
</div>

<script>
  // コピーするURLを指定
  const SHARE_URL = 'https://ichirohns-jpg.github.io/shiki.gomap-001/';

  function copyUrl() {
    const text = "🚚 志木キッチンカー GO MAP\n今日のご飯が見つかるリアルタイム地図！\n" + SHARE_URL;
    
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        alert("リンクをコピーしました！SNSでシェアしてください。");
      });
    } else {
      // 古いブラウザ用
      const t = document.createElement("textarea");
      t.value = text;
      document.body.appendChild(t);
      t.select();
      document.execCommand("copy");
      document.body.removeChild(t);
      alert("リンクをコピーしました！");
    }
  }

  // GASからデータを取得する処理（ここは以前のGASウェブアプリURLをfetchするようにしてください）
  // async function loadData() { ... }
</script>

</body>
</html>
