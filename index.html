<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木キッチンカーGo map</title>
<meta name="description" content="志木市周辺のキッチンカー出店情報をスマホで見やすく確認できます。出店募集もこちらから。">

<meta property="og:title" content="志木キッチンカーGo map">
<meta property="og:description" content="志木市周辺のキッチンカー出店情報を見やすくお届けします。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#ff8a00">
<link rel="apple-touch-icon" href="og-image.png">

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#fff7e8;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#24323f;
}

.app{
  width:100%;
  max-width:640px;
  min-height:100vh;
  margin:0 auto;
  background:#fff;
}

.hero{
  width:100%;
  display:block;
}

.head{
  padding:18px 18px 10px;
  text-align:center;
}

h1{
  margin:0 0 10px;
  font-size:32px;
  line-height:1.3;
  color:#e66a00;
  font-weight:900;
}

.lead{
  font-size:18px;
  line-height:1.7;
  font-weight:700;
}

.buttons{
  position:sticky;
  top:0;
  z-index:20;
  background:#fff;
  padding:12px 16px;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}

.btn{
  display:block;
  width:100%;
  border-radius:20px;
  padding:18px 12px;
  margin:10px 0;
  text-align:center;
  text-decoration:none;
  font-size:24px;
  line-height:1.35;
  font-weight:900;
}

.orange{
  background:#ff8a00;
  color:#fff;
}

.blue{
  background:#1e88e5;
  color:#fff;
}

.section{
  padding:18px;
}

.section-title{
  font-size:26px;
  font-weight:900;
  color:#e66a00;
  margin:8px 0 16px;
  text-align:center;
}

.card{
  background:#fffaf1;
  border:2px solid #ffd59a;
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}

.date{
  font-size:16px;
  font-weight:900;
  color:#8a4b00;
}

.title{
  font-size:24px;
  line-height:1.4;
  font-weight:900;
  margin:8px 0;
}

.place{
  font-size:18px;
  font-weight:800;
  color:#444;
  margin-top:6px;
}

.detail{
  font-size:17px;
  line-height:1.75;
  margin-top:10px;
}

.link{
  display:block;
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  background:#263238;
  color:#fff;
  text-align:center;
  text-decoration:none;
  font-size:17px;
  font-weight:900;
}

.loading{
  text-align:center;
  font-size:18px;
  padding:30px 10px;
  font-weight:800;
  line-height:1.7;
}

.note{
  text-align:center;
  font-size:15px;
  line-height:1.7;
  color:#555;
  padding:4px 18px 28px;
}
</style>
</head>

<body>

<div class="app">

  <img class="hero" src="og-image.png" alt="志木キッチンカーGo map">

  <div class="head">
    <h1>志木キッチンカー<br>Go map</h1>
    <div class="lead">
      志木市周辺のキッチンカー出店情報を<br>
      スマホで見やすく確認できます。
    </div>
  </div>

  <div class="buttons">
    <a class="btn orange" href="#list">出店情報を見る</a>
    <a class="btn blue" href="https://forms.gle/zrDqUMsHXihy5tRJ6" target="_blank" rel="noopener">出店募集</a>
  </div>

  <div id="list" class="section">
    <div class="section-title">出店情報</div>
    <div id="content" class="loading">出店情報を読み込み中です…</div>
  </div>

  <div class="note">
    登録・掲載は無料です。<br>
    キッチンカー情報を地域の人に届けるためのページです。
  </div>

</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycby85mr045pIXgHCb-y83WxzMiMbfDNLNCykculWmatkAFvAge0vh5VjRHRLAyPJyhIV/exec";

function esc(v){
  return String(v || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

fetch(DATA_URL)
  .then(function(r){ return r.json(); })
  .then(function(data){
    const box = document.getElementById("content");

    if(!Array.isArray(data) || data.length === 0){
      box.innerHTML = "現在、表示できる出店情報はありません。";
      return;
    }

    box.innerHTML = data.map(function(item){
      const date = esc(item.date);
      const title = esc(item.title || "出店情報");
      const place = esc(item.place);
      const detail = esc(item.detail).replace(/\n/g,"<br>");
      const url = esc(item.url);
      const mapUrl = esc(item.mapUrl);

      return `
        <div class="card">
          <div class="date">${date}</div>
          <div class="title">${title}</div>
          ${place ? `<div class="place">場所：${place}</div>` : ""}
          ${detail ? `<div class="detail">${detail}</div>` : ""}
          ${url ? `<a class="link" href="${url}" target="_blank" rel="noopener">詳しく見る</a>` : ""}
          ${mapUrl ? `<a class="link" href="${mapUrl}" target="_blank" rel="noopener">Googleマップを見る</a>` : ""}
        </div>
      `;
    }).join("");
  })
  .catch(function(){
    document.getElementById("content").innerHTML =
      "出店情報を読み込めませんでした。<br>少し時間をおいて、もう一度開いてください。";
  });
</script>

</body>
</html>
