<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木キッチンカー GO MAP</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
  -webkit-text-size-adjust:100%;
}

.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:26px 18px 40px;
}

.frame{
  background:#fff;
  border:7px solid #2168b8;
  border-radius:30px;
  padding:34px 28px 36px;
}

.top-banner{
  width:100%;
  border-radius:24px;
  overflow:hidden;
  background:#eef5fb;
  margin-bottom:34px;
}

.top-banner img{
  width:100%;
  display:block;
}

.title{
  margin:0 0 26px;
  text-align:center;
  font-size:44px;
  line-height:1.2;
  font-weight:900;
  color:#2168b8;
}

.lead{
  text-align:center;
  font-size:30px;
  line-height:1.7;
  font-weight:900;
  color:#111;
  margin:0 0 34px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:86px;
  border-radius:42px;
  color:#fff;
  font-size:32px;
  line-height:1.25;
  font-weight:900;
  text-decoration:none;
  text-align:center;
  margin:22px 0;
  padding:16px 20px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
  border:none;
  cursor:pointer;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.blue{background:#2168c7}
.green{background:#08ad6f}
.orange{background:#f45a00}

.note{
  margin-top:28px;
  padding:20px;
  border-radius:20px;
  background:#f4f8fc;
  color:#49657f;
  font-size:21px;
  line-height:1.8;
  font-weight:700;
  text-align:center;
}

@media(max-width:480px){
  .page{
    padding:18px 14px 34px;
  }
  .frame{
    padding:28px 22px 32px;
    border-width:6px;
    border-radius:28px;
  }
  .title{
    font-size:40px;
  }
  .lead{
    font-size:28px;
  }
  .btn{
    font-size:29px;
    min-height:82px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="frame">

    <div class="top-banner">
      <img src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w2000" alt="志木キッチンカー GO MAP">
    </div>

    <h1 class="title">志木Go map</h1>

    <p class="lead">
      志木市のキッチンカー出店情報を<br>
      見られるページです。
    </p>

    <a class="btn blue" href="https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec" target="_blank" rel="noopener">
      Go mapを開く
    </a>

    <button class="btn green" onclick="copyLink()">
      URLをコピー
    </button>

    <a class="btn orange" href="https://forms.gle/jETDC4mjDRVoPtL16" target="_blank" rel="noopener">
      出店者募集はこちら
    </a>

    <div class="note">
      登録・掲載・投稿は無料です。<br>
      志木市内や周辺のキッチンカー情報を<br>
      地域の人に見つけやすく届けます。
    </div>

  </div>
</div>

<script>
function copyLink(){
  var text =
`志木キッチンカー GO MAP

志木市のキッチンカー出店情報を見られるページです。

https://ichirohns-jpg.github.io/shiki.gomap-001/`;

  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly','');
  textarea.style.position = 'fixed';
  textarea.style.top = '-1000px';
  textarea.style.left = '-1000px';
  document.body.appendChild(textarea);

  textarea.focus();
  textarea.select();
  textarea.setSelectionRange(0, textarea.value.length);

  var ok = false;
  try{
    ok = document.execCommand('copy');
  }catch(e){
    ok = false;
  }

  document.body.removeChild(textarea);

  if(ok){
    alert('URLをコピーしました');
  }else{
    alert('コピーできませんでした。URLを長押ししてコピーしてください。');
  }
}
</script>

</body>
</html>
