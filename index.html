<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木Go map</title>

<meta property="og:title" content="志木Go map">
<meta property="og:description" content="志木市のキッチンカー出店情報を見られるページです。掲載・投稿は無料です。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background:#eef6ff;
  color:#222;
}
.wrap{
  max-width:520px;
  margin:0 auto;
  padding:24px 14px;
}
.card{
  background:#fff;
  border:4px solid #1f63bd;
  border-radius:26px;
  padding:34px 18px;
  text-align:center;
}
.logoBox{
  background:linear-gradient(135deg,#eaf6ff,#fff4e8);
  border-radius:20px;
  padding:28px 12px;
  margin-bottom:28px;
}
.logoMain{
  font-size:34px;
  font-weight:900;
  color:#1f63bd;
}
.logoSub{
  font-size:24px;
  font-weight:900;
  color:#f05a00;
  margin-top:6px;
}
h1{
  font-size:38px;
  color:#1f63bd;
  margin:10px 0 22px;
  font-weight:900;
}
.lead{
  font-size:22px;
  line-height:1.8;
  font-weight:900;
  margin-bottom:30px;
}
.btn{
  display:block;
  width:100%;
  padding:22px 14px;
  margin:16px 0;
  border-radius:999px;
  color:white;
  text-decoration:none;
  font-size:26px;
  font-weight:900;
  border:none;
}
.blue{background:#1f63bd}
.green{background:#05a86b}
.orange{background:#f05a00}
.info{
  margin-top:24px;
  background:#fff2e8;
  border-radius:18px;
  padding:18px 14px;
  font-size:20px;
  line-height:1.7;
  font-weight:900;
}
.free{color:#f05a00}
</style>
</head>

<body>
<main class="wrap">
  <section class="card">

    <div class="logoBox">
      <div class="logoMain">志木キッチンカー</div>
      <div class="logoSub">GO MAP</div>
    </div>

    <h1>志木Go map</h1>

    <div class="lead">
      志木市のキッチンカー出店情報を<br>
      見られるページです。
    </div>

    <a class="btn blue" href="./app.html">Go mapを開く</a>

    <button class="btn green" onclick="copyLink()">友だちに送るリンクをコピー</button>

    <a class="btn orange" href="https://forms.gle/jETDC4mjDRVoPtL16">出店者募集はこちら</a>

    <div class="info">
      キッチンカーオーナーの方へ<br>
      登録・掲載・投稿は<br>
      <span class="free">すべて無料</span>です。
    </div>

  </section>
</main>

<script>
function copyLink(){
  const url = "https://ichirohns-jpg.github.io/shiki.gomap-001/";
  navigator.clipboard.writeText(url).then(function(){
    alert("リンクをコピーしました");
  }).catch(function(){
    prompt("このリンクをコピーしてください", url);
  });
}
</script>
</body>
</html>
