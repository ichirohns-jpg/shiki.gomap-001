<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木Go map</title>

<meta property="og:title" content="志木Go map">
<meta property="og:description" content="キッチンカーの出店情報をすぐ確認">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/ogp.jpg">

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#eef4fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:640px;
  margin:0 auto;
  padding:92px 28px 40px;
  text-align:center;
}

h1{
  margin:0 0 26px;
  font-size:42px;
  font-weight:900;
  color:#0b63a5;
  line-height:1.2;
}

.lead{
  margin:0 0 70px;
  font-size:23px;
  font-weight:700;
  color:#666;
  line-height:1.5;
}

.btn{
  display:block;
  width:100%;
  padding:34px 18px;
  margin:0 0 34px;
  border-radius:22px;
  text-decoration:none;
  color:#fff;
  font-size:31px;
  font-weight:900;
  line-height:1.2;
  border:none;
  cursor:pointer;
}

.blue{background:#2f83dc}
.orange{background:#ff7318}

#list{
  display:none;
  margin-top:34px;
  text-align:left;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:22px;
  margin:18px 0;
  box-shadow:0 8px 22px rgba(30,80,120,.16);
}

.card .date{
  font-size:15px;
  color:#777;
  font-weight:700;
}

.card h2{
  font-size:26px;
  margin:8px 0 12px;
  color:#0b63a5;
}

.card .place{
  font-size:19px;
  font-weight:900;
  margin:8px 0;
}

.card p{
  font-size:18px;
  line-height:1.75;
  margin:14px 0;
  white-space:pre-wrap;
}

.card a{
  display:block;
  text-align:center;
  margin-top:14px;
  padding:16px;
  border-radius:14px;
  background:#2f83dc;
  color:#fff;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
}

.loading{
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#666;
}
</style>
</head>

<body>
<div class="wrap">

  <h1>志木Go map</h1>

  <p class="lead">
    キッチンカーの出店情報をすぐ確認
  </p>

  <button class="btn blue" onclick="showList()">
    出店情報を見る
  </button>

  <a class="btn orange" href="https://script.google.com/macros/s/AKfycby85mr045pIXgHCb-y83WxzMiMbfDNLNCykculWmatkAFvAge0vh5VjRHRLAyPJyhIV/exec?p=s">
    出店希望者はこちら
  </a>

  <div id="list"></div>

</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycby85mr045pIXgHCb-y83WxzMiMbfDNLNCykculWmatkAFvAge0vh5VjRHRLAyPJyhIV/exec";

async function showList(){
  const box = document.getElementById("list");
  box.style.display = "block";
  box.innerHTML = '<div class="loading">出店情報を読み込み中...</div>';

  try{
    const res = await fetch(DATA_URL);
    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){
      box.innerHTML = '<div class="card"><h2>現在、出店情報はありません</h2></div>';
      return;
    }

    data.reverse();

    box.innerHTML = data.map(item => {
      const date = esc(item.date || "");
      const title = esc(item.title || "出店情報");
      const place = esc(item.place || "");
      const detail = esc(item.detail || "");
      const url = escAttr(item.url || "");
      const status = esc(item.status || "");

      return `
        <div class="card">
          ${date ? `<div class="date">${date}</div>` : ""}
          <h2>${title}</h2>
          ${place ? `<div class="place">📍 ${place}</div>` : ""}
          ${status ? `<div class="place">${status}</div>` : ""}
          ${detail ? `<p>${detail}</p>` : ""}
          ${url ? `<a href="${url}" target="_blank" rel="noopener">詳しく見る</a>` : ""}
        </div>
      `;
    }).join("");

  }catch(e){
    box.innerHTML = '<div class="card"><h2>出店情報を読み込めませんでした</h2><p>少し時間をおいて、もう一度開いてください。</p></div>';
  }
}

function esc(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function escAttr(str){
  return esc(str).replace(/"/g,"&quot;");
}
</script>

</body>
</html>
