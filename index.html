<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>志木キッチンカー GO MAP</title>

  <meta property="og:title" content="志木キッチンカー GO MAP">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日の出店場所がわかるリアルタイム地図。">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1200">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="志木キッチンカー GO MAP">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="志木キッチンカー GO MAP">
  <meta name="twitter:description" content="志木市のキッチンカーは今どこ？今日の出店場所がわかるリアルタイム地図。">
  <meta name="twitter:image" content="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1200">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f2f5f8;
      color: #222;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      background: #ffffff;
    }

    .banner {
      width: 100%;
      display: block;
    }

    .content {
      padding: 28px 20px 40px;
    }

    h1 {
      margin: 0 0 18px;
      color: #004ea2;
      font-size: 31px;
      line-height: 1.35;
      font-weight: 900;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 700;
    }

    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 16px;
      padding: 22px 14px;
      margin: 18px 0;
      font-size: 23px;
      font-weight: 900;
      line-height: 1.4;
      text-align: center;
      color: #ffffff;
      cursor: pointer;
    }

    .btn-view {
      background: #004ea2;
    }

    .btn-send {
      background: #ff7a00;
    }

    .btn-archive {
      background: #555555;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      line-height: 1.7;
      color: #666666;
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img
      class="banner"
      src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1600"
      alt="志木キッチンカー GO MAP"
    >

    <div class="content">
      <h1>志木キッチンカー<br>GO MAP</h1>

      <p>
        志木市のキッチンカーは今どこ？<br>
        今日の出店場所・時間・お店の情報を確認できます。
      </p>

      <button class="btn btn-view" onclick="openViewer()">
        GO MAPを見る
      </button>

      <button class="btn btn-send" onclick="openSender()">
        投稿パネルを開く
      </button>

      <button class="btn btn-archive" onclick="openArchive()">
        アーカイブを見る
      </button>

      <div class="note">
        SNSで紹介するときは、このページのURLをコピーして投稿してください。
      </div>
    </div>

  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypl87uceINv3pE1vkwc1f4DCy3knkstLPikMHiZJhmsjFgBmibGbfjeuT2f8C15Lzb/exec";

    function openViewer() {
      window.location.href = GAS_URL + "?v=" + Date.now();
    }

    function openSender() {
      window.location.href = GAS_URL + "?p=s&v=" + Date.now();
    }

    function openArchive() {
      window.location.href = GAS_URL + "?p=archive&v=" + Date.now();
    }
  </script>
</body>
</html>
