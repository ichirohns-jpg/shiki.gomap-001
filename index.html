  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f2f5f8;
      overflow: hidden;
    }

    #appFrame {
      width: 100%;
      height: 100dvh;
      border: none;
      display: block;
      background: #f2f5f8;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #777;
      background: #f2f5f8;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">読み込み中...</div>

  <iframe
    id="appFrame"
    title="志木Go map"
    allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen"
  ></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec";

    const params = new URLSearchParams(window.location.search);
    params.set("v", Date.now());

    const iframeUrl = GAS_URL + "?" + params.toString();

    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    frame.onload = function() {
      loading.style.display = "none";
    };

    frame.src = iframeUrl;
  </script>
</body>
</html>
