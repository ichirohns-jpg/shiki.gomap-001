<body>
  <iframe id="appFrame"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyMndgnbpYFxqzkLYRW6aosPM3CP1Dw2nryyLm429pnKUDgcGOVLDOl8WcBeUMQySNI/exec";

    const params = new URLSearchParams(window.location.search);
    const p = params.get("p");

    let url = GAS_URL;

    if (p === "s") {
      url += "?p=s";
    } else if (p === "archive") {
      url += "?p=archive";
    }

    url += (url.indexOf("?") === -1 ? "?" : "&") + "v=" + Date.now();

    document.getElementById("appFrame").src = url;
  </script>
