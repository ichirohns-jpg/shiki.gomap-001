  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #eef6ff;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: #1f2937;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: 92%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 28px;
      padding: 28px 18px 30px;
      text-align: center;
      box-shadow: 0 10px 28px rgba(20, 70, 130, 0.16);
      border: 3px solid #1e5bb8;
    }

    .main-img {
      width: 100%;
      border-radius: 20px;
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0 0 14px;
      color: #1e5bb8;
      font-size: 34px;
      line-height: 1.35;
      font-weight: 900;
    }

    .lead {
      margin: 0 0 24px;
      font-size: 20px;
      line-height: 1.7;
      font-weight: 800;
      color: #333;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 22px 14px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 25px;
      font-weight: 900;
      text-decoration: none;
      border: none;
      cursor: pointer;
      margin-top: 14px;
      font-family: inherit;
    }

    .open-btn {
      background: #1e5bb8;
    }

    .copy-btn {
      background: #00a36c;
    }

    .owner-btn {
      background: #e65100;
    }

    .owner-note {
      margin-top: 18px;
      padding: 16px 14px;
      border-radius: 18px;
      background: #fff3e8;
      color: #333;
      font-size: 17px;
      line-height: 1.7;
      font-weight: 800;
      text-align: center;
    }

    .free {
      color: #e65100;
      font-weight: 900;
    }
  </style>
</head>

<body>
  <div class="box">
    <img
      class="main-img"
      src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=share1"
      alt="志木Go map"
    >

    <h1>志木Go map</h1>

    <p class="lead">
      志木市のキッチンカー出店情報を<br>
      見られるページです。
    </p>

    <a class="btn open-btn" href="app.html">
      Go mapを開く
    </a>

    <button class="btn copy-btn" onclick="copyUrl()">
      リンクをコピー
    </button>

    <a class="btn owner-btn" href="https://forms.gle/jETDC4mjDRVoPtL16" target="_blank" rel="noopener noreferrer">
      出店者募集はこちら
    </a>

    <div class="owner-note">
      キッチンカーオーナーの方へ<br>
      登録・掲載・投稿は<span class="free">すべて無料</span>です。
    </div>
  </div>

  <script>
    function copyUrl() {
      var text =
        '志木のキッチンカー情報を見やすくしました🚚\n\n' +
        '「今日はどこに出てるの？」\n' +
        '「場所はどこ？」\n' +
        'がすぐ分かる、志木Go mapです。\n\n' +
        'Googleマップで出店場所も確認できます。\n' +
        '志木のまちを少し楽しくする取り組みです。\n\n' +
        'よかったらシェアお願いします。\n\n' +
        'https://ichirohns-jpg.github.io/shiki.gomap-001/';

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          alert('コピーしました');
        }).catch(function() {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      var t = document.createElement('textarea');
      t.value = text;
      document.body.appendChild(t);
      t.select();
      document.execCommand('copy');
      document.body.removeChild(t);
      alert('コピーしました');
    }
  </script>
</body>
</html>
