  <style>
    html,
    body {

      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Yu Gothic UI", sans-serif;

    #appFrame {
      width: 100%;
      height: 100dvh;
      border: none;
      display: block;
      background: #f2f5f8;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #456;
      background: #f2f5f8;
      z-index: 10;
    }

    .noscript {
      padding: 24px;
      text-align: center;
      font-size: 18px;
      line-height: 1.7;
      color: #123;
    }

    .noscript a {
      color: #0b74de;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">読み込み中...</div>

  <iframe
    id="appFrame"
    title="志木Go map"
    allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen">
  </iframe>

  <noscript>
    <div class="noscript">
      志木Go mapを開くにはJavaScriptを有効にしてください。<br>
      <a href="https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec">
        アプリを開く
      </a>
    </div>
  </noscript>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec";

    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    const url = new URL(window.location.href);
    const params = url.searchParams.toString();

    frame.onload = function () {
      loading.style.display = "none";
    };

    frame.src = params ? GAS_URL + "?" + params : GAS_URL;

    setTimeout(function () {
      loading.style.display = "none";
    }, 8000);
  </script>
</body>
