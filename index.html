<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木お助け隊DX</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:38px;
  font-weight:900;
  color:#134477;
  margin:0 0 12px;
}
.sub{
  font-size:26px;
  font-weight:700;
  color:#49657f;
  margin:0 0 26px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:78px;
  border-radius:22px;
  color:#fff;
  font-size:30px;
  font-weight:900;
  text-decoration:none;
  margin:18px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
}
.blue{
  background:linear-gradient(135deg,#2f80ed,#1c73c9);
}
.green{
  background:linear-gradient(135deg,#27ae60,#1aa56c);
}
.note{
  margin-top:22px;
  font-size:22px;
  line-height:1.8;
  color:#607488;
}
</style>
</head>

<body>

<div class="page">

  <div class="banner">
    <img src="https://drive.google.com/thumbnail?id=1e6vAa1Y0oOvOlAwpgHaSvqm5mZHEEWaH&sz=w2000" alt="志木お助け隊DX">
  </div>

  <div class="card">
    <h1 class="title">志木お助け隊DX</h1>
    <p class="sub">見たいページを選んでください</p>

    <a class="btn blue" href="https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec?p=board">
      回覧板を見る
    </a>

    <a class="btn green" href="https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec?p=concierge">
      AIコンシェルジュを使う
    </a>

    <div class="note">
      市からのお知らせと、暮らしの相談先を<br>
      わかりやすく案内します。
    </div>
  </div>

</div>

</body>
</html>
