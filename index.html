<head>
<meta charset="UTF-8">

<link rel="canonical" href="https://ichirohns-jpg.github.io/shiki.gomap-001/">

<meta property="og:type" content="website">

<meta property="og:description" content="今日どこに来てる？すぐ見れる">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="志木キッチンカー GO MAP">
<meta name="twitter:description" content="今日どこに来てる？すぐ見れる">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner img{
  width:100%;
  border-radius:18px;
  display:block;
  box-shadow:0 6px 18px rgba(0,0,0,.1);
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.1);
  margin-top:18px;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 6px;
  line-height:1.25;
}
.sub{
  font-size:19px;
  color:#49657f;
  margin:0 0 20px;
  font-weight:700;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:24px;
  font-weight:900;
  text-decoration:none;
  margin:14px 0;
  border:none;
  cursor:pointer;
}
.blue{background:#2f80ed}
.green{background:#27ae60}
.orange{background:#f45a00}
.notice{
  background:#fff3cd;
  padding:12px;
  border-radius:12px;
  margin-bottom:16px;
  font-weight:bold;
  font-size:15px;
  line-height:1.5;
  border:2px solid #ffc107;
}
.copy-area{
  margin-top:20px;
  background:#f8f9fa;
  padding:15px;
  border-radius:15px;
  border:1px solid #ddd;
}
.copy-input{
  width:100%;
  padding:12px;
  font-size:14px;
  border:1px solid #ccc;
  border-radius:8px;
  text-align:center;
  margin-bottom:10px;
  background:#fff;
}
</style>
</head>

<body>
<div class="page">

  <div class="banner">
    <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg" alt="志木キッチンカー GO MAP">
  </div>

  <div class="card">

    <div class="notice">
      ⚠️ Facebookで地図が開かない場合<br>
      右上の「…」から「ブラウザで開く」を押してください。
    </div>

    <h1 class="title">志木キッチンカー<br>GO MAP</h1>
    <p class="sub">今日どこに来てる？すぐ見れる</p>

    <a class="btn blue"
       href="https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec"
       target="_blank"
       rel="noopener noreferrer">
      Go mapを見る
    </a>

    <a class="btn orange"
       href="https://forms.gle/jETDC4mjDRVoPtL16"
       target="_blank"
       rel="noopener noreferrer">
      出店はこちら
    </a>

    <div class="copy-area">
      <p style="font-size:13px;margin:0 0 10px;font-weight:bold;">
        ボタンが動かない場合はURLをコピー
      </p>

      <input type="text"
             id="urlField"
             class="copy-input"
             value="https://ichirohns-jpg.github.io/shiki.gomap-001/"
             readonly
             onclick="this.select();">

      <button class="btn green"
              style="min-height:52px;font-size:18px;margin:0;"
              onclick="handleCopy()">
        URLをコピーする
      </button>
    </div>

  </div>
</div>

<script>
function handleCopy(){
  var url = "https://ichirohns-jpg.github.io/shiki.gomap-001/";
  var input = document.getElementById("urlField");

  input.focus();
  input.select();
  input.setSelectionRange(0, 99999);

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url).then(function(){
      alert("コピーしました。SafariやChromeに貼り付けて開いてください。");
    }).catch(function(){
      fallbackCopy();
    });
  }else{
    fallbackCopy();
  }
}

function fallbackCopy(){
  try{
    document.execCommand("copy");
    alert("コピーしました。SafariやChromeに貼り付けて開いてください。");
  }catch(e){
    alert("URLを長押ししてコピーしてください。");
  }
}
</script>

</body>
</html>
