<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>志木Go map</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.note{
  margin-top:20px;
  font-size:17px;
  line-height:1.7;
  color:#607488;
}
</style>
</head>

<body>
<div class="page">

  <div class="banner">
    <img src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w2000" alt="志木Go map">
  </div>

  <div class="card">
    <h1 class="title">志木Go map</h1>
    <p class="sub">志木周辺のキッチンカー情報</p>

    <a class="btn blue" href="https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec">
      志木Go mapを見る
    </a>

    <a class="btn green" href="https://forms.gle/jETDC4mjDRVoPtL16">
      オーナー登録はこちら
    </a>

    <div class="note">
      志木市内や周辺で出店する<br>
      キッチンカー情報を見やすくお届けします。
    </div>
  </div>

</div>
</body>
</html>
