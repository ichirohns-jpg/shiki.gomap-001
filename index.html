<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>志木キッチンカー GO MAP</title>

  <meta property="og:title" content="志木キッチンカー GO MAP">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1200">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body {
      font-family: sans-serif;
      background: #f2f5f8;
      margin: 0;
      padding: 0;
      color: #333;
    }

    .header {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: white;
      line-height: 0;
    }

    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    .buttons {
      max-width: 800px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: #ffffff;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 16px 8px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      box-sizing: border-box;
    }

    .btn-view {
      background: #004ea2;
      color: #ffffff;
    }

    .btn-send {
      background: #ff7a00;
      color: #ffffff;
    }

    .btn-archive {
      background: #555555;
      color: #ffffff;
    }

    .btn-copy {
      background: #eeeeee;
      color: #333333;
    }

    .frame-wrap {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 78vh;
      border: none;
      display: block;
      background: white;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w1600" class="banner">
  </div>

  <div class="buttons">
    <button class="btn btn-view" onclick="openView()">GO MAP</button>
    <button class="btn btn-send" onclick="openSend()">投稿</button>
    <button class="btn btn-archive" onclick="openArchive()">アーカイブ</button>
    <button class="btn btn-copy" onclick="copyUrl()">リンクコピー</button>
  </div>

  <div class="frame-wrap">
    <iframe id="appFrame" src=""></iframe>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyNcQBHahDqnQk_Csmfwv_yaezLWp7YZDPV_cVDZ_trD9lq2XOvvqoq1EgnHkFLwrdS/exec";
    const SHARE_URL = "https://ichirohns-jpg.github.io/shiki.gomap-001/";

    function openView() {
      document.getElementById("appFrame").src = GAS_URL + "?v=" + Date.now();
    }

    function openSend() {
      document.getElementById("appFrame").src = GAS_URL + "?p=s&v=" + Date.now();
    }

    function openArchive() {
      document.getElementById("appFrame").src = GAS_URL + "?p=archive&v=" + Date.now();
    }

    function copyUrl() {
      const text =
        "🚚 志木キッチンカー GO MAP\n" +
        "志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。\n" +
        SHARE_URL;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          alert("GitHubのリンクをコピーしました！");
        }).catch(function() {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const t = document.createElement("textarea");
      t.value = text;
      document.body.appendChild(t);
      t.select();
      document.execCommand("copy");
      document.body.removeChild(t);
      alert("GitHubのリンクをコピーしました！");
    }

    openView();
  </script>

</body>
</html>
