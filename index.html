<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>志木キッチンカーGoマップ</title>

  <!-- Facebook / LINE / X 用 -->
  <meta property="og:title" content="志木キッチンカーGoマップ">
  <meta property="og:description" content="今日どこにキッチンカーが来ているか、地図と一緒に見やすく確認できます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501d">
  <meta property="og:image:secure_url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501d">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="志木キッチンカーGoマップ">
  <meta property="og:locale" content="ja_JP">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="志木キッチンカーGoマップ">
  <meta name="twitter:description" content="今日どこにキッチンカーが来ているか、地図と一緒に見やすく確認できます。">
  <meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501d">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #eef6ff;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: #1f2937;
    }

    body {
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 12px 34px;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(25, 78, 130, 0.16);
    }

    .image-area {
      padding: 16px;
      background: linear-gradient(180deg, #f7fbff 0%, #edf6ff 100%);
    }

    .main-image {
      width: 100%;
      display: block;
      border-radius: 22px;
    }

    .content {
      padding: 30px 22px 34px;
      text-align: center;
    }

    .label {
      display: inline-block;
      margin-bottom: 18px;
      padding: 9px 18px;
      border-radius: 999px;
      background: #eef5ff;
      color: #1d5f99;
      font-size: 16px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.3;
      color: #174a7c;
      font-weight: 900;
    }

    .lead {
      margin: 22px 0 30px;
      font-size: 21px;
      line-height: 1.8;
      font-weight: 800;
      color: #1f2937;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 21px 18px;
      border-radius: 999px;
      background: #1976d2;
      color: #ffffff;
      text-decoration: none;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(25, 118, 210, 0.32);
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #667085;
      line-height: 1.7;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .wrap {
        padding: 12px 8px 28px;
      }

      .card {
        border-radius: 24px;
      }

      .image-area {
        padding: 12px;
      }

      .main-image {
        border-radius: 18px;
      }

      .content {
        padding: 26px 18px 30px;
      }

      h1 {
        font-size: 32px;
      }

      .lead {
        font-size: 19px;
      }

      .btn {
        font-size: 24px;
        padding: 19px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <main class="card">

      <div class="image-area">
        <img
          class="main-image"
          src="gomap-ogp.jpg"
          alt="志木キッチンカーGoマップ"
        >
      </div>

      <div class="content">
        <div class="label">志木市周辺のキッチンカー情報</div>

        <h1>
          志木キッチンカー<br>
          Goマップ
        </h1>

        <p class="lead">
          今日どこにキッチンカーが来ているか、<br>
          地図と一緒に確認できます。
        </p>

        <a class="btn" href="https://shiki-go-map.netlify.app/">
          アプリを開く
        </a>

        <div class="note">
          Facebook投稿用の入口ページです
        </div>
      </div>

    </main>
  </div>
</body>
</html>
