<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>志木Go map</title>

  <meta property="og:title" content="志木Go map">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/sakura.png">

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #f2f5f8; overflow: hidden; }
    #appFrame { width: 100%; height: 100dvh; border: none; display: block; }
    .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #777; background: #f2f5f8; z-index: 1; }
  </style>
</head>
<body>
  <div id="loading" class="loading">読み込み中...</div>
  <iframe id="appFrame" title="志木Go map" allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec";
    
    const url = new URL(window.location.href);
    
    // 【重要】もしURLに v= がなければ、今日の日付を入れて強制的にURLを新しく見せる
    // これで「URLコピー」したときに、SNSが新しい画像として読み込んでくれます
    if (!url.searchParams.has('v')) {
      const version = new Date().getTime(); // 1/1000秒単位の数字
      url.searchParams.set('v', version);
      window.history.replaceState(null, null, url.search);
    }

    const iframeUrl = GAS_URL + "?" + url.searchParams.toString();
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    frame.onload = function() {
      loading.style.display = "none";
    };
    frame.src = iframeUrl;
  </script>
</body>
</html>
