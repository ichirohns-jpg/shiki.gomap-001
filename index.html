<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>志木お助け隊DX</title>

<!-- OGP（変更なし・絶対パスだけ維持） -->
<meta property="og:title" content="志木キッチンカー GO MAP">
<meta property="og:description" content="今日どこに来てる？すぐ見れる">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">

<!-- アイコン -->
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<style>
/* 元デザインそのまま */
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px;
}
.banner{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#dfeaf6;
  box-shadow:0 6px 18px rgba(20,70,120,.14);
  margin-bottom:18px;
}
.banner img{
  width:100%;
  display:block;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
  text-align:center;
}
.title{
  font-size:30px;
  font-weight:900;
  color:#134477;
  margin:0 0 10px;
}
.sub{
  font-size:20px;
  font-weight:700;
  color:#49657f;
  margin:0 0 22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:72px;
  border-radius:20px;
  color:#fff;
  font-size:25px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
}
.blue{background:linear-gradient(135deg,#2f80ed,#1c73c9)}
.green{background:linear-gradient(135deg,#27ae60,#1aa56c)}
.orange{background:linear-gradient(135deg,#f45a00,#d84315)}
.note{
  margin-top:20px;
  font-size:17px;
  line-height:1.7;
  color:#607488;
}
.notice{
  background:#fff3cd;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="page">

  <div class="banner">
    <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">
  </div>

  <div class="card">

    <div class="notice">
      ※Facebookから開いた場合は右上の「…」→「ブラウザで開く」
    </div>

    <h1 class="title">志木お助け隊DX</h1>
    <p class="sub">見たいページを選んでください</p>

    <!-- Go map（ここだけ修正済み） -->
    <a class="btn blue"
       href="https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec"
       target="_blank"
       rel="noopener noreferrer">
      Go mapを見る
    </a>

    <!-- コピー -->
    <a class="btn green" onclick="copyURL()">
      リンクをコピー
    </a>

    <!-- 出店 -->
    <a class="btn orange"
       href="https://forms.gle/jETDC4mjDRVoPtL16"
       target="_blank">
      出店はこちら
    </a>

    <div class="note">
      志木市のキッチンカー出店情報を<br>
      リアルタイムで確認できます。
    </div>

  </div>

</div>

<script>
function copyURL(){
  navigator.clipboard.writeText("https://ichirohns-jpg.github.io/shiki.gomap-001/");
  alert("URLをコピーしました");
}
</script>

</body>
</html>
