<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>志木キッチンカー GO MAP</title>

  <!-- 他の成功しているサイトと同じ「標準的」なハブ設定 -->
  <meta property="og:site_name" content="志木キッチンカー GO MAP">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shiki-go-map.netlify.app/">
  <meta property="og:title" content="志木キッチンカー GO MAP">
  <meta property="og:description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">
  
  <!-- 最も標準的な画像指定（余計な文字を一切入れない） -->
  <meta property="og:image" content="https://shiki-go-map.netlify.app/sakura.png">
  <meta property="og:image:secure_url" content="https://shiki-go-map.netlify.app/sakura.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">

  <!-- Twitter/X用 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://shiki-go-map.netlify.app/sakura.png">

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #f2f5f8; overflow: hidden; }
    #appFrame { width: 100%; height: 100dvh; border: none; display: block; }
    .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #456; background: #f2f5f8; z-index: 1; }
  </style>
</head>
<body>
  <div id="loading" class="loading">読み込み中...</div>
  <iframe id="appFrame" title="志木キッチンカー GO MAP" allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen"></iframe>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDgUmuNnll_cgVILwei9PGQMfxoR_2NeRKvvJI2C7gqsvrm0bDleDN2iwVncYZkmSV/exec";
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");
    frame.onload = () => { loading.style.display = "none"; };
    frame.src = GAS_URL; // パラメータなしの純粋なハブ直結
  </script>
</body>
</html>
