<style>
*{box-sizing:border-box}
html,body{

  padding:0;
  background:#eef5fb;

}
.page{
  width:100%;
  max-width:760px;
  margin:0 auto;

}
.frame{
  background:#fff;

}

  width:100%;

}
.top-banner img{

}
.title{
  margin:0 0 26px;

.lead{
  text-align:center;

  color:#111;
  margin:0 0 34px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:86px;
  border-radius:42px;
  color:#fff;
  font-size:32px;
  line-height:1.25;
  font-weight:900;
  text-decoration:none;
  text-align:center;
  margin:22px 0;
  padding:16px 20px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
  border:none;
  cursor:pointer;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}
.blue{background:#2168c7}
.green{background:#08ad6f}
.orange{background:#f45a00}
.note{
  margin-top:28px;
  padding:20px;
  border-radius:20px;
  background:#f4f8fc;
  color:#49657f;
  font-size:21px;
  line-height:1.8;
  font-weight:700;
  text-align:center;
}

<body>

<div class="page">
  <div class="frame">

    <div class="top-banner">
      <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg" alt="志木キッチンカー GO MAP">

    <p class="lead">
      志木市のキッチンカー出店情報を<br>

      スプレッドシートと連動した最新情報を表示します。
    </div>

  </div>
</div>

<script>
function copyLink(){
  var text =
`志木キッチンカー GO MAP

志木市のキッチンカー出店情報を見られるページです。

https://ichirohns-jpg.github.io/shiki.gomap-001/?v=final5`;

  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly','');
  textarea.style.position = 'fixed';
  textarea.style.top = '-1000px';
  textarea.style.left = '-1000px';
  document.body.appendChild(textarea);

  textarea.focus();
  textarea.select();
  textarea.setSelectionRange(0, textarea.value.length);

  try{
    document.execCommand('copy');
    alert('リンクをコピーしました');
  }catch(e){
    alert('コピーできませんでした。URLを長押ししてコピーしてください。');
  }

  document.body.removeChild(textarea);
}
</script>
