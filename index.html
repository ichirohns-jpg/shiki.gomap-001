<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>志木キッチンカーGoマップ</title>
  <meta name="description" content="志木市周辺のキッチンカー情報を、地図と一緒に見やすく確認できるページです。">

  <meta property="og:description" content="志木市周辺のキッチンカー情報を、地図と一緒に見やすく確認できます。">
  <meta property="og:type" content="website">

  <meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501b">
  <meta property="og:image:secure_url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501b">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="志木キッチンカーGoマップ">
  <meta property="og:locale" content="ja_JP">

  <!-- X 用 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="志木キッチンカーGoマップ">
  <meta name="twitter:description" content="志木市周辺のキッチンカー情報を、地図と一緒に見やすく確認できます。">
  <meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260501b">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #eef5fb;
      color: #1f2937;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 760px;
      padding: 18px 14px 40px;
    }

    .card {
      width: 100%;
      background: #ffffff;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.13);
    }

    .hero {
      width: 100%;
      padding: 24px 18px 28px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), rgba(255,255,255,0) 38%),
        linear-gradient(135deg, #dff0ff 0%, #f7fbff 48%, #ffffff 100%);
      border-bottom: 1px solid #d9e8f5;
      text-align: center;
    }

    .hero-image {
      width: 100%;
      max-width: 680px;
      display: block;
      margin: 0 auto 22px;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(20, 80, 130, 0.18);
      background: #e7f0f8;
    }

    .badge {
      display: inline-block;
      padding: 9px 18px;
      border-radius: 999px;
      background: #ffffff;
      color: #1d5f99;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(20,80,130,0.14);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: #174a7c;
      font-size: 34px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .lead {
      padding: 32px 22px 34px;
      text-align: center;
    }

    .lead p {
      margin: 0 0 28px;
      font-size: 21px;
      line-height: 1.85;
      font-weight: 800;
      color: #1f2937;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      padding: 19px 18px;
      border-radius: 999px;
      background: #1677d2;
      color: #ffffff;
      text-decoration: none;
      font-size: 25px;
      font-weight: 900;
      box-shadow: 0 7px 18px rgba(22,119,210,0.38);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 4px 12px rgba(22,119,210,0.32);
    }

    .mini {
      margin-top: 26px;
      padding: 18px;
      border-radius: 18px;
      background: #f3f8fc;
      color: #31506b;
      font-size: 16px;
      line-height: 1.7;
      font-weight: 700;
    }

    .sub {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .page {
        padding: 14px 10px 32px;
      }

      h1 {
        font-size: 31px;
      }

      .lead p {
        font-size: 20px;
      }

      .btn {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="hero">
        <img
          class="hero-image"
          src="gomap-ogp.jpg"
          alt="志木キッチンカーGoマップ"
          onerror="this.style.display='none';"
        >

        <div class="badge">志木市周辺のキッチンカー情報</div>

        <h1>
          志木キッチンカー<br>
          Goマップ
        </h1>
      </div>

      <div class="lead">
        <p>
          今日どこにキッチンカーが来ているか、<br>
          地図と一緒に見やすく確認できます。
        </p>

        <a class="btn" href="https://ichirohns-jpg.github.io/shiki.gomap-001/app.html">
          アプリを開く
        </a>

        <div class="mini">
          Facebookに投稿したときに、内容が伝わりやすいように作った入口ページです。
        </div>

        <div class="sub">
          志木キッチンカーGoマップ
        </div>
      </div>

    </section>
  </main>
</body>
</html>
