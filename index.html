<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>志木キッチンカー GO MAP</title>
<meta name="description" content="志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。">

<link rel="canonical" href="https://ichirohns-jpg.github.io/shiki.gomap-001/">

<meta property="og:type" content="website">
<meta property="og:title" content="志木キッチンカー GO MAP">
<meta property="og:description" content="今日どこに来てる？すぐ見れる">
<meta property="og:url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">
<meta property="og:image:secure_url" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="志木キッチンカー GO MAP">
<meta name="twitter:description" content="今日どこに来てる？すぐ見れる">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.page{
  max-width:760px;
  margin:0 auto;
  padding:16px;
}

.banner img{
  width:100%;
  border-radius:18px;
  display:block;
  box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.card{
  background:#fff;
  border-radius:28px;
  padding:34px 22px 30px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.10);
  margin-top:22px;
}

.title{
  font-size:34px;
  font-weight:900;
  color:#134477;
  margin:0 0 8px;
  line-height:1.2;
}

.sub{
  font-size:21px;
  color:#49657f;
  margin:0 0 28px;
  font-weight:700;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:78px;
  border-radius:22px;
  color:#fff;
  font-size:28px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  border:none;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.blue{background:#2f80ed}
.orange{background:#f45a00}

.loading{
  display:none;
  background:#fff;
  border-radius:28px;
  padding:40px 22px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.10);
  margin-top:22px;
}

.loading h1{
  color:#134477;
  font-size:30px;
  margin:0 0 14px;
}

.loading p{
  color:#49657f;
  font-size:18px;
  font-weight:700;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="page" id="home">

  <div class="banner">
    <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg" alt="志木キッチンカー GO MAP">
  </div>

  <div class="card">
    <h1 class="title">志木お助け隊DX</h1>
    <p class="sub">キッチンカー GO MAP</p>

    <a class="btn blue"
       href="https://ichirohns-jpg.github.io/shiki.gomap-001/?open=1">
      Go mapを見る
    </a>

    <a class="btn orange"
       href="https://forms.gle/jETDC4mjDRVoPtL16">
      出店はこちら
    </a>
  </div>

</div>

<div class="page" id="loading" style="display:none;">
  <div class="banner">
    <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg" alt="志木キッチンカー GO MAP">
  </div>

  <div class="loading" style="display:block;">
    <h1>Go mapを開いています</h1>
    <p>しばらくお待ちください</p>

    <a class="btn blue"
       href="https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec">
      開かない時はこちら
    </a>
  </div>
</div>

<script>
const GO_MAP_URL = "https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec";

(function(){
  const params = new URLSearchParams(window.location.search);

  if(params.get("open") === "1"){
    document.getElementById("home").style.display = "none";
    document.getElementById("loading").style.display = "block";

    setTimeout(function(){
      window.location.href = GO_MAP_URL;
    }, 400);
  }
})();
</script>

</body>
</html>
