<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木Go map</title>
</head>

<body style="margin:0;font-family:sans-serif;background:#eef5fb;">

<div style="max-width:600px;margin:20px auto;padding:10px;">
<div id="list">読み込み中...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec";

fetch(GAS_URL)
.then(res => res.json())
.then(data => {

  let html = "";

  data.forEach(item => {

    let video = "";

    if(item.url){
      let id = "";

      if(item.url.includes("youtu.be/")){
        id = item.url.split("youtu.be/")[1];
      }else if(item.url.includes("v=")){
        id = item.url.split("v=")[1];
      }

      if(id){
        video = `<iframe width="100%" height="200"
          src="https://www.youtube.com/embed/${id}"
          frameborder="0" allowfullscreen></iframe>`;
      }
    }

    html += `
      <div style="background:#fff;margin:15px 0;padding:15px;border-radius:12px;">
        <div style="font-size:22px;font-weight:bold;">${item.title}</div>
        ${video}
        <div style="margin-top:10px;">${item.detail}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;

});

</script>

</body>
</html>
