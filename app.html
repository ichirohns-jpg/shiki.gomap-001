<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>志木Go map</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 38px;
}

.header{
  background:#fff;
  border-radius:26px;
  padding:24px 18px;
  text-align:center;
  box-shadow:0 8px 22px rgba(20,70,120,.12);
  margin-bottom:18px;
}

.header h1{
  margin:0;
  font-size:38px;
  font-weight:900;
  color:#0d5fa8;
}

.header p{
  margin:12px 0 0;
  font-size:19px;
  line-height:1.6;
  font-weight:800;
  color:#526b7f;
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(20,70,120,.12);
  margin:18px 0;
  border-top:5px solid #0d5fa8;
}

.body{
  padding:20px;
}

.time{
  font-size:14px;
  color:#888;
  font-weight:800;
}

.name{
  font-size:28px;
  font-weight:900;
  color:#0d5fa8;
  margin:8px 0;
  line-height:1.3;
}

.place{
  display:inline-block;
  background:#fff3e0;
  color:#e65100;
  padding:7px 12px;
  border-radius:8px;
  font-size:17px;
  font-weight:900;
  margin:6px 0 12px;
}

.msg{
  font-size:18px;
  line-height:1.8;
  white-space:pre-wrap;
  color:#334;
  margin:8px 0 14px;
}

.btn{
  display:block;
  width:100%;
  text-align:center;
  padding:16px 12px;
  border-radius:16px;
  text-decoration:none;
  color:#fff;
  font-size:18px;
  font-weight:900;
  margin-top:12px;
  border:0;
}

.map{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
}

.home{
  background:linear-gradient(135deg,#6c7a89,#34495e);
}

.loading{
  text-align:center;
  padding:30px;
  color:#777;
  font-size:20px;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <h1>志木Go map</h1>
    <p>
      キッチンカーの出店情報を<br>
     見やすくお届けします
    </p>
  </div>

  <div id="list">
    <div class="loading">
      読み込み中...
    </div>
  </div>

  <a class="btn home" href="https://ichirohns-jpg.github.io/shiki.gomap-001/">
    トップに戻る
  </a>

</div>

<script>

const SHEET_ID = '12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?tqx=out:json';

fetch(url)
.then(r => r.text())
.then(t => {

  const json = JSON.parse(
    t.substr(47).slice(0,-2)
  );

  const rows = json.table.rows || [];

  let html = '';

  rows.reverse();

  rows.forEach(r => {

    const c = r.c || [];

    const time = c[0] ? c[0].v : '';
    const name = c[1] ? c[1].v : '';
    const place = c[2] ? c[2].v : '';
    const msg = c[3] ? c[3].v : '';
    const map = c[6] ? c[6].v : '';

    if(!name && !place && !msg){
      return;
    }

    html += `
      <div class="card">
        <div class="body">

          <div class="time">${esc(time)}</div>

          <div class="name">
            ${esc(name)}
          </div>

          <div class="place">
            📍 ${esc(place)}
          </div>

          <div class="msg">
            ${esc(msg)}
          </div>

          ${
            map
            ? `<a class="btn map" href="${escAttr(map)}" target="_blank">Googleマップを見る</a>`
            : ''
          }

        </div>
      </div>
    `;
  });

  if(!html){
    html =
    '<div class="loading">表示できる情報はありません</div>';
  }

  document.getElementById('list').innerHTML = html;

});

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function escAttr(s){
  return esc(s);
}

</script>

</body>
</html>
