<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>志木Go map｜出店情報</title>
<meta name="description" content="志木市のキッチンカー出店情報をリアルタイムでお届けします。">

<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="志木Go map">
<meta property="og:title" content="志木Go map｜出店情報">
<meta property="og:description" content="志木市のキッチンカー出店情報をリアルタイムでお届けします。">

<style>
:root{
  --blue:#0b74de;
  --deep-blue:#0b5fb3;
  --orange:#f05a00;
  --green:#22a36b;
  --bg:#eef6ff;
  --text:#1f2d3d;
  --muted:#667085;
  --card:#ffffff;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Yu Gothic UI","Meiryo",Arial,sans-serif;
  -webkit-text-size-adjust:100%;
  line-height:1.65;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:14px 12px 42px;
}

.hero{
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 10px 26px rgba(20,70,120,.14);
  margin-bottom:18px;
}

.hero-img{
  width:100%;
  display:block;
  background:#dceeff;
}

.hero-body{
  padding:24px 18px 28px;
  text-align:center;
}

.hero-title{
  font-size:44px;
  line-height:1.18;
  font-weight:900;
  color:var(--deep-blue);
  margin-bottom:14px;
  letter-spacing:-1px;
}

.hero-lead{
  font-size:23px;
  line-height:1.65;
  font-weight:900;
  color:#5f7083;
}

.hero-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:22px;
}

.hero-actions a,
.hero-actions button{
  min-height:66px;
  border:0;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  font-family:inherit;
  box-shadow:0 8px 14px rgba(0,0,0,.10);
}

.hero-actions .latest{
  background:linear-gradient(180deg,#1688ee,#0b74de);
}

.hero-actions .owner{
  background:linear-gradient(180deg,#ff751e,#f05a00);
}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:18px 0;
}

.tab-btn{
  min-height:64px;
  border:0;
  border-radius:999px;
  background:#dbeeff;
  color:var(--deep-blue);
  font-size:22px;
  font-weight:900;
  font-family:inherit;
  box-shadow:0 5px 12px rgba(20,70,120,.08);
}

.tab-btn.active{
  background:linear-gradient(180deg,#1688ee,#0b74de);
  color:#fff;
}

.notice{
  background:#fff;
  border-radius:24px;
  padding:22px 18px;
  margin-bottom:22px;
  text-align:center;
  font-size:21px;
  line-height:1.7;
  font-weight:900;
  color:#1f2d3d;
  box-shadow:0 6px 16px rgba(0,0,0,.06);
}

#loading{
  background:#fff3cd;
  color:#856404;
  padding:22px;
  border-radius:18px;
  text-align:center;
  margin:20px 0;
  font-weight:900;
  border:2px solid #ffeeba;
  font-size:20px;
}

#error-message{
  display:none;
  background:#f8d7da;
  color:#721c24;
  padding:20px;
  border-radius:18px;
  margin:20px 0;
  border:2px solid #f5c6cb;
  font-size:17px;
  font-weight:800;
  white-space:pre-wrap;
}

.section-title{
  margin:28px 0 16px;
  font-size:28px;
  line-height:1.35;
  font-weight:900;
  color:#1f2d3d;
  border-left:8px solid var(--orange);
  padding-left:14px;
}

.card-list{
  display:grid;
  gap:22px;
}

.card{
  background:var(--card);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,.10);
  border-top:7px solid var(--deep-blue);
}

.video-frame{
  width:100%;
  background:#000;
  position:relative;
  aspect-ratio:16/9;
}

.video-frame iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

.video-fallback{
  background:#111;
  padding:14px 16px 18px;
}

.video-fallback .open-youtube{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:54px;
  border-radius:12px;
  background:#cc0000;
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:900;
}

.card-inner{
  padding:22px 18px 24px;
}

.card-date{
  font-size:16px;
  color:#777;
  font-weight:900;
  margin-bottom:8px;
}

.card-title{
  font-size:32px;
  line-height:1.28;
  font-weight:900;
  color:var(--deep-blue);
  margin-bottom:12px;
  word-break:break-word;
}

.card-location{
  background:#fff3e0;
  color:#e65100;
  padding:9px 14px;
  border-radius:10px;
  font-size:19px;
  font-weight:900;
  display:inline-block;
  margin-bottom:16px;
  word-break:break-word;
}

.card-location::before{
  content:"📍 ";
}

.card-message{
  font-size:20px;
  line-height:1.85;
  white-space:pre-wrap;
  margin-bottom:18px;
  background:#f2f4f7;
  padding:16px;
  border-radius:14px;
  word-break:break-word;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:58px;
  padding:15px 12px;
  font-size:19px;
  font-weight:900;
  border-radius:14px;
  text-decoration:none;
  margin-top:12px;
  border:0;
  cursor:pointer;
  font-family:inherit;
}

.btn-map{
  background:var(--green);
  color:#fff;
}

.share-title{
  font-size:15px;
  color:#666;
  font-weight:900;
  margin:20px 0 9px;
  text-align:center;
}

.share-group{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.btn-share{
  min-height:48px;
  padding:11px 5px;
  font-size:14px;
  font-weight:900;
  color:#fff;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  border:0;
  cursor:pointer;
  font-family:inherit;
}

.share-copy{background:#6c757d}
.share-fb{background:#1877f2}
.share-line{background:#06c755}
.share-x{background:#000}

.back-btn{
  display:block;
  text-align:center;
  margin:28px 0 10px;
  padding:18px;
  border-radius:999px;
  background:#607d8b;
  color:white;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
}

.empty-box{
  background:#fff;
  border-radius:20px;
  padding:24px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#777;
}

.footer{
  text-align:center;
  margin-top:18px;
  color:#789;
  font-size:14px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="wrap">

  <section class="hero">
    <img class="hero-img" src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=3200" alt="志木Go map">
    <div class="hero-body">
      <div class="hero-title">志木Go map</div>
      <p class="hero-lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>
      <div class="hero-actions">
        <button class="latest" type="button" id="topLatestBtn">最新情報</button>
        <a class="owner" href="owner.html">出店希望者はこちら</a>
      </div>
    </div>
  </section>

  <div class="tabs">
    <button id="latest-tab" class="tab-btn active" type="button">最新情報</button>
    <button id="archive-tab" class="tab-btn" type="button">アーカイブ</button>
  </div>

  <div id="notice" class="notice">新しい出店情報から順番に表示します。</div>

  <div id="loading">出店情報を読み込んでいます…</div>
  <div id="error-message"></div>

  <section id="latest-section" style="display:none;">
    <h2 class="section-title">最新の出店情報</h2>
    <div id="latest-grid" class="card-list"></div>
  </section>

  <section id="archive-section" style="display:none;">
    <h2 class="section-title">アーカイブ</h2>
    <div id="archive-grid" class="card-list"></div>
  </section>

  <a class="back-btn" href="index.html?v=3200">← トップに戻る</a>
  <div class="footer">Shiki Go map</div>

</div>

<script>
(function(){

  const spreadsheetId = "12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw";
  const sheetName = encodeURIComponent("公開用");

  const csvUrl =
    "https://docs.google.com/spreadsheets/d/" +
    spreadsheetId +
    "/gviz/tq?tqx=out:csv&sheet=" +
    sheetName +
    "&v=" +
    Date.now();

  const EXCLUDE_WORDS = [
    "Safariで開いたページ",
    "ホーム画面に追加",
    "スマートフォンのホーム画面",
    "CsCl68YL36o",
    "CsCi68YL36o"
  ];

  let latestItems = [];
  let archiveItems = [];

  function getYouTubeId(url){
    if(!url) return null;

    const text = String(url);

    let match = text.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    return null;
  }

  function parseCSV(text){
    const rows = [];
    let row = [""];
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
      const c = text[i];
      const next = text[i + 1];

      if(c === '"'){
        if(inQuotes && next === '"'){
          row[row.length - 1] += '"';
          i++;
        }else{
          inQuotes = !inQuotes;
        }
      }else if(c === "," && !inQuotes){
        row.push("");
      }else if((c === "\r" || c === "\n") && !inQuotes){
        if(c === "\r" && next === "\n"){
          i++;
        }
        rows.push(row);
        row = [""];
      }else{
        row[row.length - 1] += c;
      }
    }

    if(row.length > 1 || row[0] !== ""){
      rows.push(row);
    }

    return rows;
  }

  function isExcludedText(text){
    return EXCLUDE_WORDS.some(function(word){
      return text.indexOf(word) !== -1;
    });
  }

  function normalizeRow(row){
    while(row.length < 11){
      row.push("");
    }

    return {
      date: String(row[0] || "").trim(),
      name: String(row[1] || "").trim(),
      location: String(row[2] || "").trim(),
      message: String(row[3] || "").trim(),
      mediaUrl: String(row[4] || "").trim(),
      mediaType: String(row[5] || "").trim(),
      lat: String(row[6] || "").trim(),
      lng: String(row[7] || "").trim(),
      mapUrl: String(row[8] || "").trim(),
      status: String(row[9] || "").trim(),
      sortOrder: Number(String(row[10] || "").trim()) || parseDateValue(row[0]) || 0
    };
  }

  function parseDateValue(value){
    const text = String(value || "").trim();

    const d = Date.parse(
      text
        .replace(/[年月]/g,"/")
        .replace(/日/g," ")
        .replace(/\./g,"/")
    );

    return isNaN(d) ? 0 : d;
  }

  function createCard(data){
    const card = document.createElement("article");
    card.className = "card";

    const ytId = getYouTubeId(data.mediaUrl);

    if(ytId){
      const frame = document.createElement("div");
      frame.className = "video-frame";

      const iframe = document.createElement("iframe");
      iframe.src =
        "https://www.youtube.com/embed/" +
        ytId +
        "?playsinline=1&rel=0&modestbranding=1";

      iframe.allow =
        "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

      iframe.allowFullscreen = true;
      iframe.title = "YouTube動画";

      frame.appendChild(iframe);
      card.appendChild(frame);

      const fallback = document.createElement("div");
      fallback.className = "video-fallback";

      const open = document.createElement("a");
      open.className = "open-youtube";
      open.href = "https://www.youtube.com/watch?v=" + ytId;
      open.target = "_blank";
      open.rel = "noopener noreferrer";
      open.textContent = "YouTubeで開く";

      fallback.appendChild(open);
      card.appendChild(fallback);
    }

    const inner = document.createElement("div");
    inner.className = "card-inner";

    const dateEl = document.createElement("div");
    dateEl.className = "card-date";
    dateEl.textContent = data.date;
    inner.appendChild(dateEl);

    const titleEl = document.createElement("div");
    titleEl.className = "card-title";
    titleEl.textContent = data.name;
    inner.appendChild(titleEl);

    if(data.location){
      const locEl = document.createElement("div");
      locEl.className = "card-location";
      locEl.textContent = data.location;
      inner.appendChild(locEl);
    }

    if(data.message){
      const msgEl = document.createElement("div");
      msgEl.className = "card-message";
      msgEl.textContent = removeUrls(data.message);
      inner.appendChild(msgEl);
    }

    if(data.mapUrl){
      const mapBtn = document.createElement("a");
      mapBtn.href = data.mapUrl;
      mapBtn.target = "_blank";
      mapBtn.rel = "noopener noreferrer";
      mapBtn.className = "btn btn-map";
      mapBtn.textContent = "Googleマップを見る";
      inner.appendChild(mapBtn);
    }

    addShareButtons(inner, data);

    card.appendChild(inner);

    return card;
  }

  function removeUrls(text){
    return String(text || "").replace(/https?:\/\/[^\s　]+/g,"").trim();
  }

  function addShareButtons(parent, data){
    const title = document.createElement("div");
    title.className = "share-title";
    title.textContent = "この情報をシェアする";
    parent.appendChild(title);

    const group = document.createElement("div");
    group.className = "share-group";

    const pageUrl = "https://ichirohns-jpg.github.io/shiki.gomap-001/app.html";
    const text =
      "【志木Go map】\n" +
      data.name + "\n" +
      (data.location ? "場所：" + data.location + "\n" : "") +
      data.date + "\n" +
      pageUrl;

    const copyBtn = document.createElement("button");
    copyBtn.className = "btn-share share-copy";
    copyBtn.textContent = "コピー";
    copyBtn.onclick = function(){
      copyText(text);
    };
    group.appendChild(copyBtn);

    const fb = document.createElement("a");
    fb.className = "btn-share share-fb";
    fb.textContent = "FB";
    fb.target = "_blank";
    fb.rel = "noopener noreferrer";
    fb.href = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(pageUrl);
    group.appendChild(fb);

    const line = document.createElement("a");
    line.className = "btn-share share-line";
    line.textContent = "LINE";
    line.target = "_blank";
    line.rel = "noopener noreferrer";
    line.href =
      "https://social-plugins.line.me/lineit/share?url=" +
      encodeURIComponent(pageUrl) +
      "&text=" +
      encodeURIComponent(text);
    group.appendChild(line);

    const x = document.createElement("a");
    x.className = "btn-share share-x";
    x.textContent = "X";
    x.target = "_blank";
    x.rel = "noopener noreferrer";
    x.href =
      "https://twitter.com/share?url=" +
      encodeURIComponent(pageUrl) +
      "&text=" +
      encodeURIComponent("【志木Go map】" + data.name);
    group.appendChild(x);

    parent.appendChild(group);
  }

  function copyText(text){
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(function(){
        alert("コピーしました");
      }).catch(function(){
        fallbackCopy(text);
      });
    }else{
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text){
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try{
      document.execCommand("copy");
      alert("コピーしました");
    }catch(e){
      prompt("コピーしてください", text);
    }

    document.body.removeChild(textarea);
  }

  function showError(message){
    document.getElementById("loading").style.display = "none";
    const error = document.getElementById("error-message");
    error.textContent = message;
    error.style.display = "block";
  }

  function render(mode){
    const latestSection = document.getElementById("latest-section");
    const archiveSection = document.getElementById("archive-section");
    const latestGrid = document.getElementById("latest-grid");
    const archiveGrid = document.getElementById("archive-grid");
    const latestTab = document.getElementById("latest-tab");
    const archiveTab = document.getElementById("archive-tab");
    const notice = document.getElementById("notice");

    latestGrid.innerHTML = "";
    archiveGrid.innerHTML = "";

    if(mode === "archive"){
      latestTab.classList.remove("active");
      archiveTab.classList.add("active");
      notice.textContent = "アーカイブを表示しています。";

      latestSection.style.display = "none";
      archiveSection.style.display = "block";

      if(archiveItems.length === 0){
        archiveGrid.innerHTML = '<div class="empty-box">アーカイブ情報はありません。</div>';
        return;
      }

      archiveItems.forEach(function(item){
        archiveGrid.appendChild(createCard(item));
      });

    }else{
      archiveTab.classList.remove("active");
      latestTab.classList.add("active");
      notice.textContent = "新しい出店情報から順番に表示します。";

      latestSection.style.display = "block";
      archiveSection.style.display = "none";

      if(latestItems.length === 0){
        latestGrid.innerHTML = '<div class="empty-box">公開中の出店情報はありません。</div>';
        return;
      }

      latestItems.forEach(function(item){
        latestGrid.appendChild(createCard(item));
      });
    }
  }

  document.getElementById("latest-tab").addEventListener("click",function(){
    render("latest");
  });

  document.getElementById("topLatestBtn").addEventListener("click",function(){
    render("latest");
    window.scrollTo({top:0,behavior:"smooth"});
  });

  document.getElementById("archive-tab").addEventListener("click",function(){
    render("archive");
  });

  fetch(csvUrl)
    .then(function(response){
      if(!response.ok){
        throw new Error("ネットワーク応答が正常ではありません。Status: " + response.status);
      }
      return response.text();
    })
    .then(function(csvText){
      const rows = parseCSV(csvText);

      if(rows.length <= 1){
        throw new Error("CSVデータが空です。Googleスプレッドシートの「ウェブに公開」を確認してください。");
      }

      const items = [];

      for(let i = 1; i < rows.length; i++){
        const item = normalizeRow(rows[i]);
        const combined = JSON.stringify(item);

        if(!item.name) continue;

        if(item.status && item.status !== "公開") continue;

        if(isExcludedText(combined)) continue;

        items.push(item);
      }

      items.sort(function(a,b){
        return b.sortOrder - a.sortOrder;
      });

      if(items.length === 0){
        throw new Error(
          "表示条件を満たすデータがありません。\n" +
          "ただしCSVは読み込めています。\n" +
          "B列の店名、J列の公開、除外ワードを確認してください。"
        );
      }

      latestItems = items.slice(0,5);
      archiveItems = items.slice(5);

      document.getElementById("loading").style.display = "none";
      render("latest");
    })
    .catch(function(error){
      showError(
        "データの読み込みまたは処理中にエラーが発生しました。\n\n" +
        error.message +
        "\n\n確認すること：\n" +
        "1. スプレッドシートがウェブに公開されているか\n" +
        "2. 「公開用」タブがCSV公開対象になっているか\n" +
        "3. A〜K列の列構成が合っているか"
      );
    });

})();
</script>

</body>
</html>
