<script>
const SHEET_ID = '12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw';

const SHEET_URLS = [
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json;responseHandler=handleSheet',
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=%E3%82%B7%E3%83%BC%E3%83%881&tqx=out:json;responseHandler=handleSheet',
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=%E6%8A%95%E7%A8%BF%E3%83%87%E3%83%BC%E3%82%BF&tqx=out:json;responseHandler=handleSheet',
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=%E5%85%AC%E9%96%8B%E7%94%A8&tqx=out:json;responseHandler=handleSheet'
];

const SITE_ROOT = 'https://ichirohns-jpg.github.io/shiki.gomap-001/';
const BASE_URL = SITE_ROOT + 'app.html';
const SHARE_PAGE = SITE_ROOT + 'share.html';
const TOP_COUNT = 5;

let ALL = [];
let urlIndex = 0;
let loaded = false;
let loadingTimer = null;

function getParam(name){
  const p = new URLSearchParams(location.search);
  return p.get(name);
}

function getCell(cell){
  if(!cell) return '';
  if(cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if(cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return '';
}

function getDeepText(cell){
  if(!cell) return '';
  let out = '';

  try{
    out += ' ' + JSON.stringify(cell);
  }catch(e){}

  if(cell.v !== undefined && cell.v !== null) out += ' ' + String(cell.v);
  if(cell.f !== undefined && cell.f !== null) out += ' ' + String(cell.f);
  if(cell.p !== undefined && cell.p !== null) out += ' ' + String(cell.p);

  return decodeText(out);
}

function decodeText(s){
  return String(s || '')
    .replace(/\\u003d/g,'=')
    .replace(/\\u0026/g,'&')
    .replace(/\\u003c/g,'<')
    .replace(/\\u003e/g,'>')
    .replace(/\\\//g,'/')
    .replace(/&amp;/g,'&')
    .replace(/%3A/gi,':')
    .replace(/%2F/gi,'/')
    .replace(/%3F/gi,'?')
    .replace(/%3D/gi,'=')
    .replace(/%26/gi,'&');
}

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function escAttr(s){
  return esc(s);
}

function parseDateForSort(s){
  if(!s) return 0;

  const t = String(s);

  const gviz = t.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(gviz){
    const y = Number(gviz[1]);
    const m = Number(gviz[2]);
    const d = Number(gviz[3]);
    const hh = Number(gviz[4] || 0);
    const mm = Number(gviz[5] || 0);
    const ss = Number(gviz[6] || 0);
    return new Date(y,m,d,hh,mm,ss).getTime();
  }

  const clean = t
    .replace(/[年月]/g,'/')
    .replace(/日/g,' ')
    .replace(/\./g,'/')
    .trim();

  const d = Date.parse(clean);
  if(!isNaN(d)) return d;

  return 0;
}

function collectUrls(row, cells, deepCells){
  let text = '';

  text += ' ' + cells.join(' ');
  text += ' ' + deepCells.join(' ');

  try{
    text += ' ' + JSON.stringify(row);
  }catch(e){}

  text = decodeText(text);

  const urls = text.match(/https?:\/\/[^\s"'<>]+/g) || [];

  return urls.map(u=>{
    return decodeText(u)
      .replace(/[)\],.。]+$/,'')
      .trim();
  }).filter(Boolean);
}

function driveId(url){
  const u = String(url || '');

  let m = u.match(/\/file\/d\/([^/]+)/);
  if(m) return m[1];

  m = u.match(/[?&]id=([^&]+)/);
  if(m) return m[1];

  m = u.match(/\/d\/([^/]+)/);
  if(m) return m[1];

  return '';
}

function makeDriveImage(url){
  const id = driveId(url);
  if(id){
    return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w1200';
  }
  return url;
}

function makeDrivePreview(url){
  const id = driveId(url);
  if(id){
    return 'https://drive.google.com/file/d/' + encodeURIComponent(id) + '/preview';
  }
  return url;
}

function isDrive(url){
  const u = String(url || '').toLowerCase();
  return u.includes('drive.google.com') || u.includes('docs.google.com/uc');
}

function isImageFile(url){
  const u = String(url || '').toLowerCase();
  return u.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/);
}

function isYoutube(url){
  const u = String(url || '').toLowerCase();
  return u.includes('youtube.com') || u.includes('youtu.be');
}

function youtubeId(url){
  const u = String(url || '');

  let m = u.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
  if(m) return m[1];

  m = u.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
  if(m) return m[1];

  m = u.match(/\/shorts\/([a-zA-Z0-9_-]{6,})/);
  if(m) return m[1];

  m = u.match(/\/embed\/([a-zA-Z0-9_-]{6,})/);
  if(m) return m[1];

  return '';
}

function findYoutubeUrl(urls){
  for(const u of urls){
    if(isYoutube(u)) return u;
  }
  return '';
}

function findDriveUrl(urls){
  for(const u of urls){
    if(isDrive(u)) return u;
  }
  return '';
}

function findImageUrl(urls){
  for(const u of urls){
    if(isImageFile(u)) return u;
  }
  return '';
}

function findMapUrl(urls, cells, place){
  for(const u of urls){
    const low = u.toLowerCase();
    if(low.includes('google.com/maps') || low.includes('maps.app.goo.gl')){
      return u;
    }
  }

  const joined = cells.join(' ');
  const latlng = joined.match(/(35\.\d+)\s*,\s*(139\.\d+)/);
  if(latlng){
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(latlng[1] + ',' + latlng[2]);
  }

  if(place){
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place + ' 志木');
  }

  return '';
}

function pickByHeader(labels, cells, words){
  for(let i=0; i<labels.length; i++){
    const label = String(labels[i] || '');
    if(words.some(w => label.includes(w))){
      return cells[i] || '';
    }
  }
  return '';
}

function firstNonEmpty(cells, indexes){
  for(const i of indexes){
    if(cells[i]) return cells[i];
  }
  return '';
}

function looksHeader(cells){
  const s = cells.join(' ');
  return s.includes('店名') && (s.includes('出店') || s.includes('場所') || s.includes('メッセージ'));
}

window.handleSheet = function(json){
  loaded = true;

  if(loadingTimer){
    clearTimeout(loadingTimer);
    loadingTimer = null;
  }

  try{
    const table = json && json.table ? json.table : null;
    const rows = table && table.rows ? table.rows : [];
    const labels = table && table.cols ? table.cols.map(c => String(c.label || c.id || '')) : [];

    ALL = rows.map((r,index)=>{
      const c = r.c || [];
      const cells = c.map(getCell);
      const deepCells = c.map(getDeepText);
      const urls = collectUrls(r, cells, deepCells);

      const dateText =
        pickByHeader(labels,cells,['日時','日付','投稿日時','登録日時','タイムスタンプ']) ||
        firstNonEmpty(cells,[0]);

      const name =
        pickByHeader(labels,cells,['店名','店舗名','キッチンカー','屋号']) ||
        firstNonEmpty(cells,[1,2]);

      const place =
        pickByHeader(labels,cells,['出店場所','場所','住所','所在地']) ||
        firstNonEmpty(cells,[2,3]);

      const msg =
        pickByHeader(labels,cells,['メッセージ','コメント','内容','説明','ひとこと']) ||
        firstNonEmpty(cells,[3,4,5]);

      const youtube = findYoutubeUrl(urls);
      const drive = findDriveUrl(urls);
      const image = findImageUrl(urls);
      const map = findMapUrl(urls, cells, place);

      return {
        id:String(index + 1),
        rowIndex:index,
        cells:cells,
        time:dateText,
        sortDate:parseDateForSort(dateText),
        name:name,
        place:place,
        msg:msg,
        youtube:youtube,
        drive:drive,
        image:image,
        map:map
      };
    })
    .filter(d => !looksHeader(d.cells))
    .filter(d => d.name || d.place || d.msg || d.youtube || d.drive || d.image);

    ALL.sort((a,b)=>{
      if(b.sortDate !== a.sortDate) return b.sortDate - a.sortDate;
      return b.rowIndex - a.rowIndex;
    });

    const id = getParam('id');

    if(id){
      showSingle(id);
    }else{
      showLatest();
    }

  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="loading">読み込み失敗です。<br>シートの列を確認してください。</div>';
  }
};

function loadSheet(){
  loaded = false;

  const old = document.getElementById('jsonpLoader');
  if(old) old.remove();

  const script = document.createElement('script');
  script.id = 'jsonpLoader';
  script.src = SHEET_URLS[urlIndex] + '&v=' + Date.now();

  script.onerror = function(){
    tryNextSheet();
  };

  document.body.appendChild(script);

  loadingTimer = setTimeout(function(){
    if(!loaded){
      tryNextSheet();
    }
  },6500);
}

function tryNextSheet(){
  if(loaded) return;

  urlIndex++;

  if(urlIndex < SHEET_URLS.length){
    loadSheet();
    return;
  }

  document.getElementById('list').innerHTML =
    '<div class="loading">出店情報を読み込めませんでした。<br>Googleシートの共有設定を<br>「リンクを知っている全員」にしてください。</div>';
}

function showSingle(id){
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('note').innerHTML = 'この出店情報を表示しています。';

  const item = ALL.find(d => d.id === String(id) || String(d.rowIndex + 1) === String(id));

  if(!item){
    document.getElementById('list').innerHTML =
      '<div class="loading">記事が見つかりません。</div>';
    return;
  }

  render([item], '記事が見つかりません。');
}

function showLatest(){
  document.getElementById('tabs').style.display = 'grid';
  document.getElementById('note').innerHTML = '新しい出店情報から順番に表示します。';
  setTab('latest');
  render(ALL.slice(0,TOP_COUNT), '表示できる出店情報はありません。');
}

function showArchive(){
  document.getElementById('tabs').style.display = 'grid';
  document.getElementById('note').innerHTML = '過去の出店情報を表示しています。';
  setTab('archive');
  render(ALL.slice(TOP_COUNT), 'アーカイブはありません。');
}

function setTab(mode){
  document.getElementById('latestBtn').className = mode === 'latest' ? 'tab active' : 'tab normal';
  document.getElementById('archiveBtn').className = mode === 'archive' ? 'tab active' : 'tab normal';
}

function render(list,emptyText){
  let html = '';

  list.forEach(d=>{
    html += card(d);
  });

  document.getElementById('list').innerHTML =
    html || '<div class="loading">' + esc(emptyText) + '</div>';
}

function card(d){
  return `
    <article class="card">
      ${mediaHtml(d)}
      <div class="body">
        ${d.time ? `<div class="time">${esc(d.time)}</div>` : ''}
        <h2 class="name">${esc(d.name || 'キッチンカー出店情報')}</h2>
        ${d.place ? `<div class="place">📍 ${esc(d.place)}</div>` : ''}
        ${d.msg ? `<div class="msg">${esc(d.msg)}</div>` : ''}
        <div class="btns">
          ${d.map ? `<a class="btn map" href="${escAttr(d.map)}" target="_blank" rel="noopener">Googleマップを見る</a>` : ''}
          ${d.youtube ? `<a class="btn" href="${escAttr(d.youtube)}" target="_blank" rel="noopener">YouTubeで開く</a>` : ''}
          ${d.drive ? `<a class="btn" href="${escAttr(d.drive)}" target="_blank" rel="noopener">動画・写真を開く</a>` : ''}
          ${shareHtml(d)}
        </div>
      </div>
    </article>
  `;
}

function mediaHtml(d){
  if(d.youtube){
    const id = youtubeId(d.youtube);
    if(id){
      return `
        <div class="media">
          <div class="video-wrap">
            <iframe
              src="https://www.youtube.com/embed/${escAttr(id)}"
              title="YouTube video"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      `;
    }
  }

  if(d.drive){
    return `
      <div class="media">
        <div class="video-wrap">
          <iframe
            src="${escAttr(makeDrivePreview(d.drive))}"
            title="Google Drive media"
            allow="autoplay"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    `;
  }

  if(d.image){
    return `
      <div class="media">
        <img src="${escAttr(d.image)}" alt="出店情報画像" loading="lazy">
      </div>
    `;
  }

  return '';
}

function shareHtml(d){
  const title = d.name || '志木Go map';
  const place = d.place || '';
  const msg = d.msg || '';
  const articleUrl = BASE_URL + '?id=' + encodeURIComponent(d.id);
  const shareUrl = SHARE_PAGE + '?id=' + encodeURIComponent(d.id);

  const text =
    '〖志木Go map〗\n\n' +
    title + '\n\n' +
    (place ? '場所：' + place + '\n\n' : '') +
    (msg ? msg + '\n\n' : '') +
    '詳しくはこちら\n' +
    shareUrl;

  const xText =
    '〖志木Go map〗\n\n' +
    title + '\n\n' +
    (place ? '場所：' + place + '\n\n' : '') +
    '詳しくはこちら';

  const fb =
    'https://www.facebook.com/sharer/sharer.php?u=' +
    encodeURIComponent(shareUrl);

  const line =
    'https://social-plugins.line.me/lineit/share?url=' +
    encodeURIComponent(shareUrl);

  const x =
    'https://twitter.com/intent/tweet?text=' +
    encodeURIComponent(xText) +
    '&url=' +
    encodeURIComponent(shareUrl);

  return `
    <button class="btn copy" type="button" onclick="copyText(${JSON.stringify(text)})">投稿文をコピー</button>
    <a class="btn fb" href="${escAttr(fb)}" target="_blank" rel="noopener">Facebookでシェア</a>
    <a class="btn line" href="${escAttr(line)}" target="_blank" rel="noopener">LINEで送る</a>
    <a class="btn x" href="${escAttr(x)}" target="_blank" rel="noopener">Xでシェア</a>
    <a class="btn" href="${escAttr(articleUrl)}">この記事だけ開く</a>
  `;
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      alert('コピーしました');
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();

  try{
    document.execCommand('copy');
    alert('コピーしました');
  }catch(e){
    alert('コピーできませんでした');
  }

  document.body.removeChild(ta);
}

loadSheet();
</script>
