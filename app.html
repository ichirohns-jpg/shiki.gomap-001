<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木Go map</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  background:#eef5fb;
}
.wrap{
  max-width:680px;
  margin:0 auto;
  padding:16px;
}
.title{
  font-size:28px;
  font-weight:900;
  text-align:center;
  margin:16px 0;
}
.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.name{
  font-size:22px;
  font-weight:900;
}
.detail{
  font-size:18px;
  margin-top:10px;
}
.video{
  margin-top:10px;
  border-radius:12px;
  overflow:hidden;
}
</style>

</head>

<body>

<div class="wrap">
  <div class="title">志木Go map</div>
  <div id="list">読み込み中...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyk0noKfvnS0uGUttnBaXyznoLtbiD7tAQOZTqd8YDwNFAlw8Uf_f_EN47WFbHJ_--2/exec";

fetch(GAS_URL)
  .then(res => res.json())
  .then(data => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="name">${item.title}</div>
        ${getYouTube(item.url)}
        <div class="detail">${item.detail}</div>
      `;

      list.appendChild(div);
    });

  });

function getYouTube(url){
  if(!url) return "";

  let id = "";

  if(url.includes("youtu.be/")){
    id = url.split("youtu.be/")[1].split("?")[0];
  }else if(url.includes("watch?v=")){
    id = url.split("v=")[1].split("&")[0];
  }else if(url.includes("shorts/")){
    id = url.split("shorts/")[1].split("?")[0];
  }

  if(!id) return "";

  return `
    <div class="video">
      <iframe width="100%" height="220"
        src="https://www.youtube.com/embed/${id}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
  `;
}

</script>

</body>
</html>
