<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木Go map</title>
</head>

<body style="margin:0;font-family:sans-serif;background:#eef5fb;">

<div style="max-width:600px;margin:20px auto;padding:10px;">
  <div id="list">読み込み中...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzhTd6DoEUjEYSY_ADQkjYC97fHdUUz4kEZ_cKFWoJGBYA-LCUBy85_7rBVqYBepWR9BA/exec";

fetch(GAS_URL)
.then(res => res.json())
.then(data => {
  let html = "";

  data.forEach(item => {
    let video = "";

    if(item.url){
      let id = "";

      if(item.url.includes("youtu.be/")){
        id = item.url.split("youtu.be/")[1].split("?")[0];
      }else if(item.url.includes("watch?v=")){
        id = item.url.split("v=")[1].split("&")[0];
      }else if(item.url.includes("shorts/")){
        id = item.url.split("shorts/")[1].split("?")[0];
      }

      if(id){
        video = `
          <div style="margin-top:10px;border-radius:12px;overflow:hidden;">
            <iframe width="100%" height="220"
              src="https://www.youtube.com/embed/${id}"
              frameborder="0"
              allowfullscreen>
            </iframe>
          </div>
        `;
      }
    }

    html += `
      <div style="background:#fff;margin:15px 0;padding:15px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);">
        <div style="font-size:22px;font-weight:bold;">${item.title || "出店情報"}</div>
        ${video}
        <div style="margin-top:10px;font-size:17px;line-height:1.6;">${item.detail || ""}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "現在、表示できる出店情報はありません。";
})
.catch(err => {
  document.getElementById("list").innerHTML = "読み込みエラー";
});
</script>

</body>
</html>
