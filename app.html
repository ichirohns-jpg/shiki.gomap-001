<style>
*{
  box-sizing:border-box;
}

  margin:0;
  padding:0;
  background:#eef6ff;
  color:#1f2937;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;

.wrap{
  width:100%;

.hero{
  background:#ffffff;
  border:3px solid #1e5bb8;

  box-shadow:0 10px 28px rgba(20,70,130,.16);

.hero img{

  aspect-ratio:1200/630;

  margin:0 0 12px;

  gap:12px;

}

  border:none;

}

.tab.normal{

  background:#ffffff;
  border-radius:24px;
  padding:22px 16px;
  margin-bottom:18px;
  text-align:center;
  font-size:20px;
  line-height:1.7;
  font-weight:900;
  color:#1f2937;
  box-shadow:0 8px 22px rgba(20,70,130,.10);
}

.card{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  margin:0 0 18px;
  box-shadow:0 8px 24px rgba(20,70,130,.14);
  border:2px solid #d7e9ff;
}

.media{
  width:100%;
  background:#eef6ff;
}

.media img{
  width:100%;
  display:block;
  object-fit:cover;
  max-height:420px;
}

.body{
  padding:20px 18px 22px;
}

.time{
  display:inline-block;
  margin-bottom:10px;
  padding:7px 12px;
  border-radius:999px;
  background:#eef6ff;
  color:#334155;
  font-size:15px;
  font-weight:900;
}

.name{
  margin:0 0 10px;
  font-size:30px;
  line-height:1.3;
  color:#1268b3;
  font-weight:900;
}

.place{
  margin:10px 0;
  font-size:21px;

}

.msg{
  margin:12px 0 0;
  font-size:19px;
  line-height:1.75;
  font-weight:700;
  color:#334155;

}

.btns{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;

}

.btn{
  display:block;

  border-radius:999px;

  background:#1e5bb8;

}

.btn.map{
  background:#00a36c;
}

.btn.copy{
  background:#607d8b;
}

.btn.fb{
  background:#1877f2;
}

.btn.line{
  background:#06c755;
}

.btn.x{
  background:#111827;
}

.loading{
  background:#ffffff;
  border-radius:26px;
  padding:28px 18px;
  text-align:center;
  font-size:21px;
  line-height:1.7;
  font-weight:900;
  color:#1f2937;
  box-shadow:0 8px 22px rgba(20,70,130,.10);
}

.home{
  display:block;
  margin-top:22px;
  padding:18px 12px;
  border-radius:999px;
  background:#607d8b;
  color:#fff;
  text-align:center;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
}

.footer{
  margin-top:18px;
  text-align:center;
  font-size:14px;
  color:#607080;
  font-weight:700;
}

  display:none;
}

</head>

<body>
<div class="wrap">

  <section class="hero">
    <img src="gomap-ogp.jpg?v=20260602" alt="志木Go map">
    <div class="hero-body">
      <h1>志木Go map</h1>
      <p class="lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>

      <div class="top-buttons">
        <a class="blue" href="app.html?v=20260602">最新情報</a>
        <a class="orange" href="owner.html">出店希望者はこちら</a>
      </div>
    </div>
  </section>

  <div class="tabs" id="tabs">
    <button id="latestBtn" class="tab active" type="button" onclick="showLatest()">最新情報</button>
    <button id="archiveBtn" class="tab normal" type="button" onclick="showArchive()">アーカイブ</button>
  </div>

  <div class="note" id="note">新しい出店情報から順番に表示します。</div>

  <div id="list">
    <div class="loading">出店情報を読み込んでいます...</div>
  </div>

  <a class="home" href="index.html?v=20260602">← トップに戻る</a>

  <div class="footer">Shiki Go map</div>

</div>

<script>
const SHEET_ID = '12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw';
const SHEET_NAMES = ['シート1','公開用','投稿データ'];
const SITE_ROOT = 'https://ichirohns-jpg.github.io/shiki.gomap-001/';
const BASE_URL = SITE_ROOT + 'app.html';
const SHARE_PAGE = SITE_ROOT + 'share.html';
const TOP_COUNT = 5;

let ALL = [];
let sheetIndex = 0;
let loaded = false;

function getParam(name){
  const p = new URLSearchParams(location.search);
  return p.get(name);
}

function getCell(cell){
  if(!cell) return '';
  if(cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if(cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return '';
}

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function escAttr(s){
  return esc(s);
}

function parseDateForSort(s){
  if(!s) return 0;

  const t = String(s);

  const gviz = t.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(gviz){
    const y = Number(gviz[1]);
    const m = Number(gviz[2]);
    const d = Number(gviz[3]);
    const hh = Number(gviz[4] || 0);
    const mm = Number(gviz[5] || 0);
    const ss = Number(gviz[6] || 0);
    return new Date(y,m,d,hh,mm,ss).getTime();
  }

  const clean = t
    .replace(/[年月]/g,'/')
    .replace(/日/g,' ')
    .replace(/\./g,'/')
    .trim();

  const d = Date.parse(clean);
  if(!isNaN(d)) return d;

  return 0;
}

function makeDriveImage(url){
  if(!url) return '';

  let id = '';

  let m = String(url).match(/\/file\/d\/([^/]+)/);
  if(m) id = m[1];

  m = String(url).match(/[?&]id=([^&]+)/);
  if(!id && m) id = m[1];

  if(id){
    return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w1200';
  }

  return url;
}

function isImage(url){
  const u = String(url || '').toLowerCase();
  return (
    u.includes('drive.google.com') ||
    u.includes('googleusercontent.com') ||
    u.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/)
  );
}

function isYoutube(url){
  const u = String(url || '').toLowerCase();
  return u.includes('youtube.com') || u.includes('youtu.be');
}

function findUrlInText(text){
  const m = String(text || '').match(/https?:\/\/[^\s"'<>]+/);
  return m ? m[0] : '';
}

function findMapUrl(cells, place){
  const joined = cells.join(' ');
  const urls = joined.match(/https?:\/\/[^\s"'<>]+/g) || [];

  for(const u of urls){
    const low = u.toLowerCase();
    if(low.includes('google.com/maps') || low.includes('maps.app.goo.gl')){
      return u;
    }
  }

  const latlng = joined.match(/(35\.\d+)\s*,\s*(139\.\d+)/);
  if(latlng){
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(latlng[1] + ',' + latlng[2]);
  }

  if(place){
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place + ' 志木');
  }

  return '';
}

function findMediaUrl(cells){
  const joined = cells.join(' ');
  const urls = joined.match(/https?:\/\/[^\s"'<>]+/g) || [];

  for(const u of urls){
    const low = u.toLowerCase();
    if(
      low.includes('drive.google.com') ||
      low.includes('googleusercontent.com') ||
      low.includes('youtube.com') ||
      low.includes('youtu.be') ||
      low.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/)
    ){
      return u;
    }
  }

  return '';
}

function looksHeader(cells){
  const s = cells.join(' ');
  return s.includes('店名') && (s.includes('出店') || s.includes('場所') || s.includes('メッセージ'));
}

window.handleSheet = function(json){
  loaded = true;

  try{
    const rows = json && json.table && json.table.rows ? json.table.rows : [];

    ALL = rows.map((r,index)=>{
      const c = r.c || [];
      const cells = c.map(getCell);

      const dateText = getCell(c[0]);
      const name = getCell(c[1]);
      const place = getCell(c[2]);
      const msg = getCell(c[3]);
      const mediaCell = getCell(c[4]);
      const media = mediaCell || findMediaUrl(cells);
      const map = getCell(c[6]) || findMapUrl(cells, place);

      return {
        id:String(index + 1),
        rowIndex:index,
        cells:cells,
        time:dateText,
        sortDate:parseDateForSort(dateText),
        name:name,
        place:place,
        msg:msg,
        media:media,
        map:map
      };
    })
    .filter(d => !looksHeader(d.cells))
    .filter(d => d.name || d.place || d.msg || d.media);

    ALL.sort((a,b)=>{
      if(b.sortDate !== a.sortDate) return b.sortDate - a.sortDate;
      return b.rowIndex - a.rowIndex;
    });

    const id = getParam('id');

    if(id){
      showSingle(id);
    }else{
      showLatest();
    }

  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="loading">読み込み失敗です。<br>シートの列を確認してください。</div>';
  }
};

function loadSheet(){
  loaded = false;

  const old = document.getElementById('jsonpLoader');
  if(old) old.remove();

  const sheetName = SHEET_NAMES[sheetIndex];

  const script = document.createElement('script');
  script.id = 'jsonpLoader';
  script.src =
    'https://docs.google.com/spreadsheets/d/' +
    encodeURIComponent(SHEET_ID) +
    '/gviz/tq?sheet=' +
    encodeURIComponent(sheetName) +
    '&tqx=out:json;responseHandler:handleSheet&v=' +
    Date.now();

  script.onerror = function(){
    tryNextSheet();
  };

  document.body.appendChild(script);

  setTimeout(function(){
    if(!loaded){
      tryNextSheet();
    }
  },5000);
}

function tryNextSheet(){
  if(loaded) return;

  sheetIndex++;

  if(sheetIndex < SHEET_NAMES.length){
    loadSheet();
    return;
  }

  document.getElementById('list').innerHTML =
    '<div class="loading">出店情報を読み込めませんでした。<br>Googleシートの共有設定を<br>「リンクを知っている全員」にしてください。</div>';
}

function showSingle(id){
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('note').innerHTML = 'この出店情報を表示しています。';

  const item = ALL.find(d => d.id === String(id) || String(d.rowIndex + 1) === String(id));

  if(!item){
    document.getElementById('list').innerHTML =
      '<div class="loading">記事が見つかりません。</div>';
    return;
  }

  render([item], '記事が見つかりません。');
}

function showLatest(){
  document.getElementById('tabs').style.display = 'grid';
  document.getElementById('note').innerHTML = '新しい出店情報から順番に表示します。';
  setTab('latest');
  render(ALL.slice(0,TOP_COUNT), '表示できる出店情報はありません。');
}

function showArchive(){
  document.getElementById('tabs').style.display = 'grid';
  document.getElementById('note').innerHTML = '過去の出店情報を表示しています。';
  setTab('archive');
  render(ALL.slice(TOP_COUNT), 'アーカイブはありません。');
}

function setTab(mode){
  document.getElementById('latestBtn').className = mode === 'latest' ? 'tab active' : 'tab normal';
  document.getElementById('archiveBtn').className = mode === 'archive' ? 'tab active' : 'tab normal';
}

function render(list,emptyText){
  let html = '';

  list.forEach(d=>{
    html += card(d);
  });

  document.getElementById('list').innerHTML =
    html || '<div class="loading">' + esc(emptyText) + '</div>';
}

function card(d){
  return `
    <article class="card">
      ${mediaHtml(d.media)}
      <div class="body">
        ${d.time ? `<div class="time">${esc(d.time)}</div>` : ''}
        <h2 class="name">${esc(d.name || 'キッチンカー出店情報')}</h2>
        ${d.place ? `<div class="place">📍 ${esc(d.place)}</div>` : ''}
        ${d.msg ? `<div class="msg">${esc(d.msg)}</div>` : ''}
        <div class="btns">
          ${d.map ? `<a class="btn map" href="${escAttr(d.map)}" target="_blank" rel="noopener">Googleマップを見る</a>` : ''}
          ${shareHtml(d)}
        </div>
      </div>
    </article>
  `;
}

function mediaHtml(url){
  if(!url) return '';

  if(isYoutube(url)){
    return `
      <div class="media">
        <a class="btn" href="${escAttr(url)}" target="_blank" rel="noopener">動画を見る</a>
      </div>
    `;
  }

  if(isImage(url)){
    return `
      <div class="media">
        <img src="${escAttr(makeDriveImage(url))}" alt="出店情報画像" loading="lazy">
      </div>
    `;
  }

  return '';
}

function shareHtml(d){
  const title = d.name || '志木Go map';
  const place = d.place || '';
  const msg = d.msg || '';
  const articleUrl = BASE_URL + '?id=' + encodeURIComponent(d.id);
  const shareUrl = SHARE_PAGE + '?id=' + encodeURIComponent(d.id);

  const text =
    '〖志木Go map〗\n\n' +
    title + '\n\n' +
    (place ? '場所：' + place + '\n\n' : '') +
    (msg ? msg + '\n\n' : '') +
    '詳しくはこちら\n' +
    shareUrl;

  const xText =
    '〖志木Go map〗\n\n' +
    title + '\n\n' +
    (place ? '場所：' + place + '\n\n' : '') +
    '詳しくはこちら';

  const fb =
    'https://www.facebook.com/sharer/sharer.php?u=' +
    encodeURIComponent(shareUrl);

  const line =
    'https://social-plugins.line.me/lineit/share?url=' +
    encodeURIComponent(shareUrl);

  const x =
    'https://twitter.com/intent/tweet?text=' +
    encodeURIComponent(xText) +
    '&url=' +
    encodeURIComponent(shareUrl);

  return `
    <button class="btn copy" type="button" onclick="copyText(${JSON.stringify(text)})">投稿文をコピー</button>
    <a class="btn fb" href="${escAttr(fb)}" target="_blank" rel="noopener">Facebookでシェア</a>
    <a class="btn line" href="${escAttr(line)}" target="_blank" rel="noopener">LINEで送る</a>
    <a class="btn x" href="${escAttr(x)}" target="_blank" rel="noopener">Xでシェア</a>
    <a class="btn" href="${escAttr(articleUrl)}">この記事だけ開く</a>
  `;
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      alert('コピーしました');
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();

  try{
    document.execCommand('copy');
    alert('コピーしました');
  }catch(e){
    alert('コピーできませんでした');
  }

  document.body.removeChild(ta);
}

loadSheet();
</script>
</body>
</html>
