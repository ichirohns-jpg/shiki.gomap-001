<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>志木Go map｜出店情報</title>

<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="志木Go map">
<meta property="og:title" content="志木Go map｜出店情報">
<meta property="og:description" content="志木市のキッチンカー出店情報をお届けします。">

<style>
:root{
  --primary:#0b5fb3;
  --blue:#0b74de;
  --orange:#f05a00;
  --bg:#eef6ff;
  --card:#ffffff;
  --text:#263241;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Yu Gothic UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:14px;
  font-size:18px;
  line-height:1.6;
  -webkit-text-size-adjust:100%;
}

.container{
  width:100%;
  max-width:760px;
  margin:0 auto;
}

.top-card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
  margin-bottom:18px;
}

.top-image{
  width:100%;
  display:block;
  background:#dbeeff;
}

.top-body{
  text-align:center;
  padding:22px 16px 26px;
}

h1{
  margin:0 0 12px;
  font-size:42px;
  line-height:1.18;
  color:var(--primary);
  font-weight:900;
}

.lead{
  margin:0;
  font-size:22px;
  line-height:1.65;
  color:#607080;
  font-weight:900;
}

.top-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:22px;
}

.top-actions a,
.top-actions button{
  min-height:64px;
  border:none;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  font-size:20px;
  font-weight:900;
  font-family:inherit;
}

.top-actions .latest{
  background:var(--blue);
}

.top-actions .owner{
  background:var(--orange);
}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:18px 0;
}

.tab-btn{
  min-height:62px;
  border:none;
  border-radius:999px;
  background:#dbeeff;
  color:var(--primary);
  font-size:22px;
  font-weight:900;
  font-family:inherit;
}

.tab-btn.active{
  background:var(--blue);
  color:#fff;
}

.notice{
  background:#fff;
  border-radius:22px;
  padding:20px 16px;
  margin-bottom:18px;
  text-align:center;
  font-size:20px;
  line-height:1.65;
  font-weight:900;
  box-shadow:0 6px 16px rgba(0,0,0,.06);
}

#loading{
  background:#fff3cd;
  color:#856404;
  padding:20px;
  border-radius:14px;
  text-align:center;
  margin:20px 0;
  font-weight:900;
  border:2px solid #ffeeba;
  font-size:20px;
}

#error-message{
  display:none;
  background:#f8d7da;
  color:#721c24;
  padding:18px;
  border-radius:14px;
  margin:20px 0;
  border:2px solid #f5c6cb;
  font-size:17px;
  font-weight:800;
  white-space:pre-wrap;
}

.section-title{
  margin:28px 0 15px;
  font-size:24px;
  border-left:6px solid var(--orange);
  padding-left:12px;
  font-weight:900;
}

.card-list{
  display:grid;
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 7px 18px rgba(0,0,0,.08);
  border-top:6px solid var(--primary);
}

.card-inner{
  padding:20px 18px 22px;
}

.card-date{
  font-size:15px;
  color:#777;
  font-weight:800;
  margin-bottom:6px;
}

.card-title{
  font-size:30px;
  line-height:1.3;
  font-weight:900;
  color:var(--primary);
  margin-bottom:10px;
  word-break:break-word;
}

.card-location{
  background:#fff3e0;
  color:#e65100;
  padding:8px 13px;
  border-radius:8px;
  font-size:18px;
  font-weight:900;
  display:inline-block;
  margin-bottom:14px;
  word-break:break-word;
}

.card-location::before{
  content:"📍 ";
}

.card-message{
  font-size:19px;
  line-height:1.8;
  white-space:pre-wrap;
  margin-bottom:16px;
  background:#f1f3f5;
  padding:14px;
  border-radius:10px;
  word-break:break-word;
}

.video-container{
  background:#111;
  padding:18px;
}

.youtube-thumb{
  width:100%;
  display:block;
  border-radius:14px;
  margin-bottom:12px;
  background:#222;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:16px;
  font-size:18px;
  font-weight:900;
  border-radius:12px;
  text-decoration:none;
  margin-top:10px;
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.btn-youtube{
  background:#cc0000;
  color:#fff;
}

.btn-map{
  background:#34a853;
  color:#fff;
}

.share-title{
  font-size:15px;
  color:#666;
  font-weight:900;
  margin:18px 0 8px;
  text-align:center;
}

.share-group{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.btn-share{
  padding:13px 5px;
  font-size:14px;
  font-weight:900;
  color:#fff;
  border-radius:9px;
  text-align:center;
  text-decoration:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.share-copy{background:#6c757d}
.share-fb{background:#3b5998}
.share-line{background:#06c755}
.share-x{background:#000}

.back-btn{
  display:block;
  text-align:center;
  margin:26px 0 10px;
  padding:18px;
  border-radius:999px;
  background:#607d8b;
  color:white;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
}

.empty-box{
  background:#fff;
  border-radius:18px;
  padding:22px;
  text-align:center;
  font-size:19px;
  font-weight:900;
  color:#777;
}
</style>
</head>

<body>

<div class="container">

  <section class="top-card">
    <img class="top-image" src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=3100" alt="志木Go map">
    <div class="top-body">
      <h1>志木Go map</h1>
      <p class="lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>
      <div class="top-actions">
        <button class="latest" type="button" id="topLatestBtn">最新情報</button>
        <a class="owner" href="owner.html">出店希望者はこちら</a>
      </div>
    </div>
  </section>

  <div class="tabs">
    <button id="latest-tab" class="tab-btn active" type="button">最新情報</button>
    <button id="archive-tab" class="tab-btn" type="button">アーカイブ</button>
  </div>

  <div id="notice" class="notice">新しい出店情報から順番に表示します。</div>

  <div id="loading">出店情報を読み込んでいます…</div>
  <div id="error-message"></div>

  <section id="latest-section" style="display:none;">
    <h2 class="section-title">最新の出店情報</h2>
    <div id="latest-grid" class="card-list"></div>
  </section>

  <section id="archive-section" style="display:none;">
    <h2 class="section-title">アーカイブ</h2>
    <div id="archive-grid" class="card-list"></div>
  </section>

  <a class="back-btn" href="index.html?v=3100">← トップに戻る</a>

</div>

<script>
(function(){

  const spreadsheetId = "12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw";
  const sheetName = encodeURIComponent("公開用");

  const csvUrl =
    "https://docs.google.com/spreadsheets/d/" +
    spreadsheetId +
    "/gviz/tq?tqx=out:csv&sheet=" +
    sheetName +
    "&v=" +
    Date.now();

  const EXCLUDE_WORDS = [
    "Safariで開いたページ",
    "ホーム画面に追加",
    "スマートフォンのホーム画面",
    "CsCl68YL36o",
    "CsCi68YL36o"
  ];

  let latestItems = [];
  let archiveItems = [];

  function getYouTubeId(url){
    if(!url) return null;

    const text = String(url);

    let match = text.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    match = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

    return null;
  }

  function parseCSV(text){
    const rows = [];
    let row = [""];
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
      const c = text[i];
      const next = text[i + 1];

      if(c === '"'){
        if(inQuotes && next === '"'){
          row[row.length - 1] += '"';
          i++;
        }else{
          inQuotes = !inQuotes;
        }
      }else if(c === "," && !inQuotes){
        row.push("");
      }else if((c === "\r" || c === "\n") && !inQuotes){
        if(c === "\r" && next === "\n"){
          i++;
        }
        rows.push(row);
        row = [""];
      }else{
        row[row.length - 1] += c;
      }
    }

    if(row.length > 1 || row[0] !== ""){
      rows.push(row);
    }

    return rows;
  }

  function isExcludedText(text){
    return EXCLUDE_WORDS.some(function(word){
      return text.indexOf(word) !== -1;
    });
  }

  function normalizeRow(row){
    while(row.length < 11){
      row.push("");
    }

    return {
      date: String(row[0] || "").trim(),
      name: String(row[1] || "").trim(),
      location: String(row[2] || "").trim(),
      message: String(row[3] || "").trim(),
      mediaUrl: String(row[4] || "").trim(),
      mediaType: String(row[5] || "").trim(),
      lat: String(row[6] || "").trim(),
      lng: String(row[7] || "").trim(),
      mapUrl: String(row[8] || "").trim(),
      status: String(row[9] || "").trim(),
      sortOrder: Number(String(row[10] || "").trim()) || parseDateValue(row[0]) || 0
    };
  }

  function parseDateValue(value){
    const text = String(value || "").trim();

    const d = Date.parse(
      text
        .replace(/[年月]/g,"/")
        .replace(/日/g," ")
        .replace(/\./g,"/")
    );

    return isNaN(d) ? 0 : d;
  }

  function createCard(data){
    const card = document.createElement("article");
    card.className = "card";

    const ytId = getYouTubeId(data.mediaUrl);

    if(ytId){
      const video = document.createElement("div");
      video.className = "video-container";

      const img = document.createElement("img");
      img.src = "https://img.youtube.com/vi/" + ytId + "/hqdefault.jpg";
      img.alt = "YouTubeサムネイル";
      img.className = "youtube-thumb";
      video.appendChild(img);

      const ytBtn = document.createElement("a");
      ytBtn.href = "https://www.youtube.com/watch?v=" + ytId;
      ytBtn.target = "_blank";
      ytBtn.rel = "noopener noreferrer";
      ytBtn.className = "btn btn-youtube";
      ytBtn.textContent = "YouTubeで動画を見る";
      video.appendChild(ytBtn);

      card.appendChild(video);
    }

    const inner = document.createElement("div");
    inner.className = "card-inner";

    const dateEl = document.createElement("div");
    dateEl.className = "card-date";
    dateEl.textContent = data.date;
    inner.appendChild(dateEl);

    const titleEl = document.createElement("div");
    titleEl.className = "card-title";
    titleEl.textContent = data.name;
    inner.appendChild(titleEl);

    if(data.location){
      const locEl = document.createElement("div");
      locEl.className = "card-location";
      locEl.textContent = data.location;
      inner.appendChild(locEl);
    }

    if(data.message){
      const msgEl = document.createElement("div");
      msgEl.className = "card-message";
      msgEl.textContent = removeUrls(data.message);
      inner.appendChild(msgEl);
    }

    if(data.mapUrl){
      const mapBtn = document.createElement("a");
      mapBtn.href = data.mapUrl;
      mapBtn.target = "_blank";
      mapBtn.rel = "noopener noreferrer";
      mapBtn.className = "btn btn-map";
      mapBtn.textContent = "Googleマップを見る";
      inner.appendChild(mapBtn);
    }

    addShareButtons(inner, data);

    card.appendChild(inner);

    return card;
  }

  function removeUrls(text){
    return String(text || "").replace(/https?:\/\/[^\s　]+/g,"").trim();
  }

  function addShareButtons(parent, data){
    const title = document.createElement("div");
    title.className = "share-title";
    title.textContent = "この情報をシェアする";
    parent.appendChild(title);

    const group = document.createElement("div");
    group.className = "share-group";

    const pageUrl = "https://ichirohns-jpg.github.io/shiki.gomap-001/app.html";
    const text =
      "【志木Go map】\n" +
      data.name + "\n" +
      (data.location ? "場所：" + data.location + "\n" : "") +
      data.date + "\n" +
      pageUrl;

    const copyBtn = document.createElement("button");
    copyBtn.className = "btn-share share-copy";
    copyBtn.textContent = "コピー";
    copyBtn.onclick = function(){
      copyText(text);
    };
    group.appendChild(copyBtn);

    const fb = document.createElement("a");
    fb.className = "btn-share share-fb";
    fb.textContent = "FB";
    fb.target = "_blank";
    fb.rel = "noopener noreferrer";
    fb.href = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(pageUrl);
    group.appendChild(fb);

    const line = document.createElement("a");
    line.className = "btn-share share-line";
    line.textContent = "LINE";
    line.target = "_blank";
    line.rel = "noopener noreferrer";
    line.href =
      "https://social-plugins.line.me/lineit/share?url=" +
      encodeURIComponent(pageUrl) +
      "&text=" +
      encodeURIComponent(text);
    group.appendChild(line);

    const x = document.createElement("a");
    x.className = "btn-share share-x";
    x.textContent = "X";
    x.target = "_blank";
    x.rel = "noopener noreferrer";
    x.href =
      "https://twitter.com/share?url=" +
      encodeURIComponent(pageUrl) +
      "&text=" +
      encodeURIComponent("【志木Go map】" + data.name);
    group.appendChild(x);

    parent.appendChild(group);
  }

  function copyText(text){
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(function(){
        alert("コピーしました");
      }).catch(function(){
        fallbackCopy(text);
      });
    }else{
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text){
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try{
      document.execCommand("copy");
      alert("コピーしました");
    }catch(e){
      prompt("コピーしてください", text);
    }

    document.body.removeChild(textarea);
  }

  function showError(message){
    document.getElementById("loading").style.display = "none";
    const error = document.getElementById("error-message");
    error.textContent = message;
    error.style.display = "block";
  }

  function render(mode){
    const latestSection = document.getElementById("latest-section");
    const archiveSection = document.getElementById("archive-section");
    const latestGrid = document.getElementById("latest-grid");
    const archiveGrid = document.getElementById("archive-grid");
    const latestTab = document.getElementById("latest-tab");
    const archiveTab = document.getElementById("archive-tab");
    const notice = document.getElementById("notice");

    latestGrid.innerHTML = "";
    archiveGrid.innerHTML = "";

    if(mode === "archive"){
      latestTab.classList.remove("active");
      archiveTab.classList.add("active");
      notice.textContent = "アーカイブを表示しています。";

      latestSection.style.display = "none";
      archiveSection.style.display = "block";

      if(archiveItems.length === 0){
        archiveGrid.innerHTML = '<div class="empty-box">アーカイブ情報はありません。</div>';
        return;
      }

      archiveItems.forEach(function(item){
        archiveGrid.appendChild(createCard(item));
      });

    }else{
      archiveTab.classList.remove("active");
      latestTab.classList.add("active");
      notice.textContent = "新しい出店情報から順番に表示します。";

      latestSection.style.display = "block";
      archiveSection.style.display = "none";

      if(latestItems.length === 0){
        latestGrid.innerHTML = '<div class="empty-box">公開中の出店情報はありません。</div>';
        return;
      }

      latestItems.forEach(function(item){
        latestGrid.appendChild(createCard(item));
      });
    }
  }

  document.getElementById("latest-tab").addEventListener("click",function(){
    render("latest");
  });

  document.getElementById("topLatestBtn").addEventListener("click",function(){
    render("latest");
    window.scrollTo({top:0,behavior:"smooth"});
  });

  document.getElementById("archive-tab").addEventListener("click",function(){
    render("archive");
  });

  fetch(csvUrl)
    .then(function(response){
      if(!response.ok){
        throw new Error("ネットワーク応答が正常ではありません。Status: " + response.status);
      }
      return response.text();
    })
    .then(function(csvText){
      const rows = parseCSV(csvText);

      if(rows.length <= 1){
        throw new Error("CSVデータが空です。Googleスプレッドシートの「ウェブに公開」を確認してください。");
      }

      const items = [];

      for(let i = 1; i < rows.length; i++){
        const item = normalizeRow(rows[i]);
        const combined = JSON.stringify(item);

        if(!item.name) continue;

        /*
          ここを強くしすぎない。
          J列が空でも表示する。
          J列に「非公開」などが入った時だけ除外する。
        */
        if(item.status && item.status !== "公開") continue;

        if(isExcludedText(combined)) continue;

        items.push(item);
      }

      items.sort(function(a,b){
        return b.sortOrder - a.sortOrder;
      });

      if(items.length === 0){
        throw new Error(
          "表示条件を満たすデータがありません。\n" +
          "ただしCSVは読み込めています。\n" +
          "B列の店名、J列の公開、除外ワードを確認してください。"
        );
      }

      latestItems = items.slice(0,5);
      archiveItems = items.slice(5);

      document.getElementById("loading").style.display = "none";
      render("latest");
    })
    .catch(function(error){
      showError(
        "データの読み込みまたは処理中にエラーが発生しました。\n\n" +
        error.message +
        "\n\n確認すること：\n" +
        "1. スプレッドシートがウェブに公開されているか\n" +
        "2. 「公開用」タブがCSV公開対象になっているか\n" +
        "3. A〜K列の列構成が合っているか"
      );
    });

})();
</script>

</body>
</html>
