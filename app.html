<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta property="og:description" content="志木市のキッチンカー出店情報をお届けします。">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Yu Gothic UI",sans-serif;
  background:#eef6ff;
  color:#263241;
  padding:15px;
  font-size:18px;
  line-height:1.6;
  -webkit-text-size-adjust:100%;
}

.container{
  max-width:620px;
  margin:0 auto;
}

.top-image{
  width:100%;
  border-radius:20px;
  margin-bottom:18px;
  display:block;
  background:#dbeeff;
}

h1{
  text-align:center;
  margin:15px 0 20px;
  font-size:34px;
  color:#0b5fb3;
  font-weight:900;
}

h2{
  margin:30px 0 15px;
  font-size:24px;
  border-left:6px solid #ff6b6b;
  padding-left:12px;
  font-weight:900;
}

#status{
  background:#fff3cd;
  color:#856404;
  padding:20px;
  border-radius:14px;
  text-align:center;
  margin:20px 0;
  font-weight:900;
  border:2px solid #ffeeba;
  font-size:20px;
}

#status.error{
  background:#f8d7da;
  color:#721c24;
  border-color:#f5c6cb;
}

.card-list{
  display:grid;
  gap:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  border-top:6px solid #0b5fb3;
}

.date{
  font-size:15px;
  color:#666;
  font-weight:800;
  margin-bottom:6px;
}

.shop-name{
  font-size:26px;
  font-weight:900;
  color:#0b5fb3;
  margin-bottom:10px;
  word-break:break-word;
}

.location{
  font-size:19px;
  color:#e65100;
  font-weight:900;
  margin-bottom:12px;
  background:#fff3e0;
  display:inline-block;
  padding:8px 12px;
  border-radius:8px;
  word-break:break-word;
}

.message{
  font-size:19px;
  white-space:pre-wrap;
  margin-bottom:15px;
  background:#f1f3f5;
  padding:14px;
  border-radius:10px;
  word-break:break-word;
}

.yt-thumb-container{
  margin-bottom:15px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  padding-top:56.25%;
  background:#000;
}

.yt-thumb-container img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:16px;
  font-size:18px;
  font-weight:900;
  border-radius:12px;
  text-decoration:none;
  margin-bottom:10px;
  border:none;
  cursor:pointer;
}

.btn-youtube{background:#cc0000;color:white}
.btn-map{background:#34a853;color:white}

.share-title{
  font-size:15px;
  color:#666;
  font-weight:900;
  margin:16px 0 8px;
  text-align:center;
}

.share-group{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.btn-share{
  padding:12px 5px;
  font-size:14px;
  font-weight:900;
  color:white;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  border:none;
  cursor:pointer;
}

.share-copy{background:#6c757d}
.share-fb{background:#3b5998}
.share-line{background:#06c755}
.share-x{background:#000}

.back-btn{
  display:block;
  text-align:center;
  margin:26px 0 10px;
  padding:18px;
  border-radius:999px;
  background:#607d8b;
  color:white;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
}

.small-note{
  font-size:14px;
  color:#777;
  margin-top:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <img class="top-image" src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=2900" alt="志木Go map">

  <h1>志木Go map</h1>

  <div id="status">出店情報を読み込んでいます…</div>

  <div id="main-content" style="display:none;">
    <h2>最新の出店情報</h2>
    <div id="recent-list" class="card-list"></div>

    <h2 id="archive-title">アーカイブ情報</h2>
    <div id="archive-list" class="card-list"></div>
  </div>

  <a class="back-btn" href="index.html?v=2900">← トップに戻る</a>

</div>

<script>
const EXCLUDE_WORDS = [
  "Safariで開いたページ",
  "ホーム画面に追加",
  "スマートフォンのホーム画面",
  "CsCl68YL36o",
  "CsCi68YL36o"
];

function getYouTubeId(url){
  if(!url) return null;

  const text = String(url);

  let match = text.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if(match) return match[1];

  match = text.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/);
  if(match) return match[1];

  match = text.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if(match) return match[1];

  match = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if(match) return match[1];

  return null;
}

function isExcluded(rowText){
  return EXCLUDE_WORDS.some(function(word){
    return rowText.indexOf(word) !== -1;
  });
}

function copyToClipboard(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      alert("コピーしました！");
    }).catch(function(){
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try{
    document.execCommand("copy");
    alert("コピーしました！");
  }catch(err){
    prompt("コピーしてください", text);
  }

  document.body.removeChild(textarea);
}

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g,function(match){
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[match];
  });
}

function escapeAttr(str){
  return escapeHtml(str);
}

function escapeJs(str){
  return String(str || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'")
    .replace(/\n/g,"\\n")
    .replace(/\r/g,"");
}

function parseDateValue(text){
  const s = String(text || "");

  const m = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(m){
    return new Date(
      Number(m[1]),
      Number(m[2]),
      Number(m[3]),
      Number(m[4] || 0),
      Number(m[5] || 0),
      Number(m[6] || 0)
    ).getTime();
  }

  const clean = s.replace(/[年月]/g,"/").replace(/日/g," ").replace(/\./g,"/").trim();
  const d = Date.parse(clean);
  return isNaN(d) ? 0 : d;
}

/* 重要：Googleから呼ばれる関数。必ず window 直下に置く */
window.myCallback = function(data){
  const statusEl = document.getElementById("status");

  if(!data || !data.table){
    statusEl.className = "error";
    statusEl.innerText = "データの構造が不正です。Googleシートの公開設定かURLを確認してください。";
    return;
  }

  const rows = data.table.rows || [];

  if(rows.length === 0){
    statusEl.className = "error";
    statusEl.innerText = "有効なデータ行が見つかりませんでした。";
    return;
  }

  const validData = [];

  for(let i = 0; i < rows.length; i++){
    const cells = rows[i].c || [];

    const getValue = function(idx){
      return cells[idx] && cells[idx].v !== null && cells[idx].v !== undefined
        ? String(cells[idx].v).trim()
        : "";
    };

    const getFormattedValue = function(idx){
      return cells[idx] && cells[idx].f !== null && cells[idx].f !== undefined
        ? String(cells[idx].f).trim()
        : getValue(idx);
    };

    const item = {
      date: getFormattedValue(0),
      shopName: getValue(1),
      location: getValue(2),
      message: getValue(3),
      mediaUrl: getValue(4),
      mediaType: getValue(5),
      lat: getValue(6),
      lng: getValue(7),
      mapUrl: getValue(8),
      status: getValue(9),
      sortOrder: parseFloat(getValue(10)) || parseDateValue(getFormattedValue(0)) || 0
    };

    const combinedText = JSON.stringify(item);

    if(
      item.shopName !== "" &&
      item.status === "公開" &&
      !isExcluded(combinedText)
    ){
      validData.push(item);
    }
  }

  validData.sort(function(a,b){
    return b.sortOrder - a.sortOrder;
  });

  if(validData.length === 0){
    statusEl.className = "error";
    statusEl.innerText = "表示条件を満たすデータがありません。J列が「公開」になっているか確認してください。";
    return;
  }

  statusEl.style.display = "none";
  document.getElementById("main-content").style.display = "block";

  const recentList = document.getElementById("recent-list");
  const archiveList = document.getElementById("archive-list");
  const archiveTitle = document.getElementById("archive-title");

  recentList.innerHTML = "";
  archiveList.innerHTML = "";

  validData.forEach(function(item,index){
    const card = document.createElement("div");
    card.className = "card";

    let cardHtml = "";

    cardHtml += '<div class="date">' + escapeHtml(item.date) + "</div>";
    cardHtml += '<div class="shop-name">' + escapeHtml(item.shopName) + "</div>";

    if(item.location){
      cardHtml += '<div class="location">' + escapeHtml(item.location) + "</div>";
    }

    if(item.message){
      cardHtml += '<div class="message">' + escapeHtml(item.message) + "</div>";
    }

    const ytId = getYouTubeId(item.mediaUrl);

    if(ytId){
      cardHtml +=
        '<div class="yt-thumb-container">' +
        '<img src="https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg" alt="YouTubeサムネイル">' +
        "</div>" +
        '<a href="https://www.youtube.com/watch?v=' + ytId + '" target="_blank" rel="noopener noreferrer" class="btn btn-youtube">YouTubeで動画を見る</a>';
    }

    if(item.mapUrl){
      cardHtml +=
        '<a href="' + escapeAttr(item.mapUrl) + '" target="_blank" rel="noopener noreferrer" class="btn btn-map">Googleマップを見る</a>';
    }

    const shareBaseUrl = "https://ichirohns-jpg.github.io/shiki.gomap-001/app.html";
    const shareUrl = encodeURIComponent(shareBaseUrl);
    const shareText = encodeURIComponent("【志木Go map】" + item.shopName + " - " + item.location + " " + item.date);

    const copyText =
      "【志木Go map】\\n" +
      item.shopName + "\\n" +
      (item.location ? "場所：" + item.location + "\\n" : "") +
      item.date + "\\n" +
      shareBaseUrl;

    cardHtml +=
      '<div class="share-title">この情報をシェアする</div>' +
      '<div class="share-group">' +
      '<button onclick="copyToClipboard(\\'' + escapeJs(copyText) + '\\')" class="btn-share share-copy">コピー</button>' +
      '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" rel="noopener noreferrer" class="btn-share share-fb">FB</a>' +
      '<a href="https://social-plugins.line.me/lineit/share?url=' + shareUrl + '&text=' + shareText + '" target="_blank" rel="noopener noreferrer" class="btn-share share-line">LINE</a>' +
      '<a href="https://twitter.com/share?url=' + shareUrl + '&text=' + shareText + '" target="_blank" rel="noopener noreferrer" class="btn-share share-x">X</a>' +
      "</div>";

    card.innerHTML = cardHtml;

    if(index < 5){
      recentList.appendChild(card);
    }else{
      archiveList.appendChild(card);
    }
  });

  if(validData.length <= 5){
    archiveTitle.style.display = "none";
    archiveList.style.display = "none";
  }else{
    archiveTitle.style.display = "block";
    archiveList.style.display = "grid";
  }
};

/* ここでJSONPを開始 */
(function(){
  const spreadsheetId = "12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw";
  const sheetName = encodeURIComponent("公開用");

  const url =
    "https://docs.google.com/spreadsheets/d/" +
    spreadsheetId +
    "/gviz/tq?tqx=responseHandler:myCallback&sheet=" +
    sheetName +
    "&v=" +
    Date.now();

  const script = document.createElement("script");
  script.src = url;
  script.type = "text/javascript";

  script.onerror = function(){
    const statusEl = document.getElementById("status");
    statusEl.className = "error";
    statusEl.innerText = "スクリプトの読み込みに失敗しました。URL・シート名・公開設定を確認してください。";
  };

  document.body.appendChild(script);

  setTimeout(function(){
    const statusEl = document.getElementById("status");
    if(statusEl && statusEl.style.display !== "none"){
      statusEl.className = "error";
      statusEl.innerText =
        "読み込みが完了しません。callbackが呼ばれていません。app.htmlのJSONP設定またはGoogleシート側を確認してください。";
    }
  },8000);
})();
</script>

</body>
</html>
