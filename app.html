<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#eef6ff;
  color:#1f2937;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  -webkit-text-size-adjust:100%;
}

body{
  min-height:100vh;
}

.wrap{
  width:100%;
  max-width:640px;
  margin:0 auto;
  padding:14px 12px 36px;
}

.hero{
  background:#ffffff;
  border:3px solid #1e5bb8;
  border-radius:28px;
  padding:18px 16px 20px;
  text-align:center;
  box-shadow:0 10px 28px rgba(20,70,130,.16);
  margin-bottom:16px;
}

.hero img{
  width:100%;
  display:block;
  border-radius:20px;
  margin:0 auto 16px;
}

h1{
  margin:0 0 8px;
  font-size:34px;
  line-height:1.3;
  color:#1e5bb8;
  font-weight:900;
}

.lead{
  margin:0;
  font-size:19px;
  line-height:1.65;
  font-weight:800;
}

.nav{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:14px 0 0;
}

.nav button,
.nav a{
  appearance:none;
  border:none;
  border-radius:999px;
  padding:16px 10px;
  font-size:18px;
  font-weight:900;
  text-decoration:none;
  text-align:center;
  color:#ffffff;
  background:#1e5bb8;
  font-family:inherit;
  cursor:pointer;
}

.nav .orange{
  background:#e65100;
}

.tabs{
  display:flex;
  gap:10px;
  margin:16px 0;
}

.tab{
  flex:1;
  border:none;
  border-radius:999px;
  padding:15px 10px;
  font-size:20px;
  font-weight:900;
  background:#d8e8ff;
  color:#1e5bb8;
  font-family:inherit;
}

.tab.active{
  background:#1e5bb8;
  color:#fff;
}

.status{
  background:#fff;
  border-radius:22px;
  padding:22px 16px;
  text-align:center;
  font-size:19px;
  line-height:1.7;
  font-weight:800;
  box-shadow:0 6px 18px rgba(20,70,130,.10);
}

.section-title{
  margin:18px 4px 12px;
  font-size:26px;
  font-weight:900;
  color:#123b73;
}

.card{
  background:#ffffff;
  border-radius:26px;
  padding:18px 16px 20px;
  margin:0 0 16px;
  box-shadow:0 8px 22px rgba(20,70,130,.13);
  border:2px solid #d8e8ff;
}

.card-title{
  margin:0 0 8px;
  font-size:27px;
  line-height:1.35;
  color:#1e5bb8;
  font-weight:900;
}

.date{
  display:inline-block;
  margin:0 0 10px;
  padding:6px 12px;
  border-radius:999px;
  background:#eef6ff;
  color:#335;
  font-size:15px;
  font-weight:900;
}

.place{
  margin:8px 0;
  font-size:20px;
  line-height:1.55;
  font-weight:900;
  color:#222;
}

.msg{
  margin:10px 0 0;
  font-size:18px;
  line-height:1.75;
  font-weight:700;
  color:#333;
  white-space:pre-wrap;
}

.media{
  margin:14px 0 0;
}

.media img{
  width:100%;
  display:block;
  border-radius:20px;
  background:#eee;
}

.btns{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:14px;
}

.btn{
  display:block;
  width:100%;
  border:none;
  border-radius:999px;
  padding:16px 12px;
  font-size:19px;
  font-weight:900;
  text-align:center;
  text-decoration:none;
  color:#fff;
  background:#1e5bb8;
  font-family:inherit;
}

.btn.green{
  background:#00a36c;
}

.btn.gray{
  background:#607d8b;
}

.btn.orange{
  background:#e65100;
}

.back{
  display:block;
  margin:18px 0 0;
  padding:16px 12px;
  border-radius:999px;
  background:#607d8b;
  color:#fff;
  text-align:center;
  text-decoration:none;
  font-size:18px;
  font-weight:900;
}

.small{
  margin-top:14px;
  font-size:14px;
  color:#667;
  line-height:1.7;
  text-align:center;
}

.hidden{
  display:none;
}
</style>
</head>

<body>
<div class="wrap">

  <section class="hero">
    <img src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=20260602" alt="志木Go map">
    <h1>志木Go map</h1>
    <p class="lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>

    <div class="nav">
      <button type="button" onclick="showTab('latest')">最新情報</button>
      <a class="orange" href="https://forms.gle/RAMooJbaBFmK7Ani6" target="_blank" rel="noopener">出店希望者はこちら</a>
    </div>
  </section>

  <div class="tabs">
    <button id="tabLatest" class="tab active" onclick="showTab('latest')">最新情報</button>
    <button id="tabArchive" class="tab" onclick="showTab('archive')">アーカイブ</button>
  </div>

  <div id="status" class="status">出店情報を読み込んでいます...</div>

  <div id="singleArea" class="hidden"></div>

  <div id="latestArea" class="hidden">
    <div class="section-title">最新の出店情報</div>
    <div id="latestList"></div>
  </div>

  <div id="archiveArea" class="hidden">
    <div class="section-title">アーカイブ</div>
    <div id="archiveList"></div>
  </div>

  <a class="back" href="index.html">← トップに戻る</a>

  <div class="small">Shiki Go map</div>
</div>

<script>
const SHEET_ID = "12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw";
const SHEET_NAME = "シート1";
const OWNER_FORM_URL = "https://forms.gle/RAMooJbaBFmK7Ani6";
const TOP_COUNT = 5;

let allItems = [];
let currentTab = "latest";
let loaded = false;

const qs = new URLSearchParams(location.search);
const targetId = qs.get("id");

function getCell(cell){
  if(!cell) return "";
  if(cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if(cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return "";
}

function normalizeText(v){
  return String(v || "").replace(/\s+/g," ").trim();
}

function esc(s){
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function labelIndex(labels, names){
  for(const n of names){
    const idx = labels.findIndex(l => String(l || "").includes(n));
    if(idx >= 0) return idx;
  }
  return -1;
}

function pick(raw, labels, names, fallbackIndexes){
  const idx = labelIndex(labels, names);
  if(idx >= 0 && raw[idx]) return raw[idx];

  for(const i of fallbackIndexes){
    if(raw[i]) return raw[i];
  }
  return "";
}

function findUrl(raw, keywords){
  const joined = raw.join(" ");
  const urls = joined.match(/https?:\/\/[^\s"'<>]+/g) || [];

  if(!keywords || keywords.length === 0){
    return urls[0] || "";
  }

  for(const url of urls){
    const low = url.toLowerCase();
    if(keywords.some(k => low.includes(k))) return url;
  }

  return "";
}

function findMediaUrl(raw){
  const urls = raw.join(" ").match(/https?:\/\/[^\s"'<>]+/g) || [];

  for(const url of urls){
    const low = url.toLowerCase();
    if(
      low.includes("drive.google.com") ||
      low.includes("googleusercontent.com") ||
      low.includes("youtube.com") ||
      low.includes("youtu.be") ||
      low.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/)
    ){
      return url;
    }
  }

  return "";
}

function findMapUrl(raw, place){
  const urls = raw.join(" ").match(/https?:\/\/[^\s"'<>]+/g) || [];

  for(const url of urls){
    const low = url.toLowerCase();
    if(low.includes("google.com/maps") || low.includes("maps.app.goo.gl")) return url;
  }

  const latLng = raw.join(" ").match(/(35\.\d+)\s*,\s*(139\.\d+)/);
  if(latLng){
    return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(latLng[1] + "," + latLng[2]);
  }

  if(place){
    return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place + " 志木");
  }

  return "";
}

function driveImage(url){
  if(!url) return "";

  let id = "";

  let m = url.match(/\/file\/d\/([^/]+)/);
  if(m) id = m[1];

  m = url.match(/[?&]id=([^&]+)/);
  if(!id && m) id = m[1];

  if(id){
    return "https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1200";
  }

  return url;
}

function isImageUrl(url){
  const low = String(url || "").toLowerCase();
  return (
    low.includes("drive.google.com") ||
    low.includes("googleusercontent.com") ||
    low.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/)
  );
}

function isYoutubeUrl(url){
  const low = String(url || "").toLowerCase();
  return low.includes("youtube.com") || low.includes("youtu.be");
}

function parseDateValue(text){
  if(!text) return 0;

  const s = String(text);

  const gviz = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(gviz){
    const y = Number(gviz[1]);
    const m = Number(gviz[2]);
    const d = Number(gviz[3]);
    const hh = Number(gviz[4] || 0);
    const mm = Number(gviz[5] || 0);
    const ss = Number(gviz[6] || 0);
    return new Date(y,m,d,hh,mm,ss).getTime();
  }

  const cleaned = s
    .replace(/[年月]/g,"/")
    .replace(/[日]/g," ")
    .replace(/\./g,"/")
    .trim();

  const t = Date.parse(cleaned);
  if(!isNaN(t)) return t;

  return 0;
}

function looksHeader(raw){
  const s = raw.join(" ");
  return (
    s.includes("店名") &&
    (s.includes("出店") || s.includes("場所") || s.includes("メッセージ"))
  );
}

function makeItem(row, labels, index){
  const raw = (row.c || []).map(getCell);

  const date = pick(raw, labels, ["日時","日付","投稿日","投稿日時","登録日時"], [0]);
  const shop = pick(raw, labels, ["店名","店舗名","キッチンカー名","屋号"], [1]);
  const place = pick(raw, labels, ["出店場所","場所","住所","所在地"], [3,2]);
  const message = pick(raw, labels, ["メッセージ","コメント","内容","説明","ひとこと"], [4,3]);

  const mediaByLabel = pick(raw, labels, ["画像","写真","メディア","動画","URL"], []);
  const mediaUrl = mediaByLabel || findMediaUrl(raw);

  const id = pick(raw, labels, ["ID","id","番号"], []) || String(index + 1);
  const mapUrl = findMapUrl(raw, place);

  const sortText = pick(raw, labels, ["並び替え","ソート","sort"], []) || date;

  return {
    id:String(id).trim(),
    rowNumber:String(index + 1),
    raw,
    date,
    shop,
    place,
    message,
    mediaUrl,
    mapUrl,
    sortValue:parseDateValue(sortText) || parseDateValue(date) || index
  };
}

function cardHtml(item){
  const title = item.shop || "キッチンカー出店情報";
  const date = item.date || "";
  const place = item.place || "";
  const message = item.message || "";

  let media = "";
  if(item.mediaUrl){
    if(isYoutubeUrl(item.mediaUrl)){
      media = `
        <div class="btns">
          <a class="btn orange" href="${esc(item.mediaUrl)}" target="_blank" rel="noopener">動画を見る</a>
        </div>
      `;
    }else if(isImageUrl(item.mediaUrl)){
      media = `
        <div class="media">
          <img src="${esc(driveImage(item.mediaUrl))}" alt="${esc(title)}" loading="lazy">
        </div>
      `;
    }
  }

  let mapBtn = "";
  if(item.mapUrl){
    mapBtn = `<a class="btn green" href="${esc(item.mapUrl)}" target="_blank" rel="noopener">Googleマップで見る</a>`;
  }

  const shareUrl = "https://ichirohns-jpg.github.io/shiki.gomap-001/app.html?id=" + encodeURIComponent(item.id);
  const shareText = "志木Go map｜" + title + "\n" + (place ? place + "\n" : "") + shareUrl;

  return `
    <article class="card">
      <h2 class="card-title">${esc(title)}</h2>
      ${date ? `<div class="date">${esc(date)}</div>` : ""}
      ${place ? `<div class="place">📍 ${esc(place)}</div>` : ""}
      ${message ? `<div class="msg">${esc(message)}</div>` : ""}
      ${media}
      <div class="btns">
        ${mapBtn}
        <button class="btn gray" type="button" onclick="copyText('${esc(shareText).replace(/\n/g,"\\n")}')">この情報をコピー</button>
      </div>
    </article>
  `;
}

function render(){
  const status = document.getElementById("status");
  const singleArea = document.getElementById("singleArea");
  const latestArea = document.getElementById("latestArea");
  const archiveArea = document.getElementById("archiveArea");
  const latestList = document.getElementById("latestList");
  const archiveList = document.getElementById("archiveList");

  status.classList.add("hidden");

  if(!allItems.length){
    status.textContent = "現在、表示できる出店情報がありません。";
    status.classList.remove("hidden");
    latestArea.classList.add("hidden");
    archiveArea.classList.add("hidden");
    singleArea.classList.add("hidden");
    return;
  }

  if(targetId){
    const one = allItems.find(item => item.id === targetId || item.rowNumber === targetId);
    if(one){
      singleArea.innerHTML = `<div class="section-title">出店情報</div>` + cardHtml(one);
      singleArea.classList.remove("hidden");
      latestArea.classList.add("hidden");
      archiveArea.classList.add("hidden");
      return;
    }
  }

  const latest = allItems.slice(0, TOP_COUNT);
  const archive = allItems.slice(TOP_COUNT);

  latestList.innerHTML = latest.map(cardHtml).join("");

  if(archive.length){
    archiveList.innerHTML = archive.map(cardHtml).join("");
  }else{
    archiveList.innerHTML = `<div class="status">アーカイブはまだありません。</div>`;
  }

  showTab(currentTab);
}

function showTab(name){
  currentTab = name;

  const latestArea = document.getElementById("latestArea");
  const archiveArea = document.getElementById("archiveArea");
  const singleArea = document.getElementById("singleArea");
  const tabLatest = document.getElementById("tabLatest");
  const tabArchive = document.getElementById("tabArchive");

  if(targetId && singleArea && !singleArea.classList.contains("hidden")){
    return;
  }

  if(name === "archive"){
    latestArea.classList.add("hidden");
    archiveArea.classList.remove("hidden");
    tabLatest.classList.remove("active");
    tabArchive.classList.add("active");
  }else{
    latestArea.classList.remove("hidden");
    archiveArea.classList.add("hidden");
    tabLatest.classList.add("active");
    tabArchive.classList.remove("active");
  }
}

function copyText(text){
  const fixed = String(text || "").replace(/\\n/g,"\n");

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(fixed).then(function(){
      alert("コピーしました");
    }).catch(function(){
      fallbackCopy(fixed);
    });
  }else{
    fallbackCopy(fixed);
  }
}

function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{
    document.execCommand("copy");
    alert("コピーしました");
  }catch(e){
    alert("コピーできませんでした");
  }
  document.body.removeChild(ta);
}

window.handleSheet = function(json){
  loaded = true;

  try{
    const table = json && json.table ? json.table : null;
    if(!table || !table.rows){
      throw new Error("no rows");
    }

    const labels = (table.cols || []).map(col => String(col.label || col.id || "").trim());

    allItems = table.rows
      .map((row,index) => makeItem(row, labels, index))
      .filter(item => !looksHeader(item.raw))
      .filter(item => {
        const joined = normalizeText(item.raw.join(" "));
        return joined && (item.shop || item.place || item.message || item.mediaUrl);
      })
      .sort((a,b) => b.sortValue - a.sortValue);

    render();

  }catch(err){
    const status = document.getElementById("status");
    status.textContent = "出店情報を読み込めませんでした。シートの公開設定または列名を確認してください。";
    status.classList.remove("hidden");
  }
};

function loadSheet(){
  const status = document.getElementById("status");

  const script = document.createElement("script");
  const url =
    "https://docs.google.com/spreadsheets/d/" +
    encodeURIComponent(SHEET_ID) +
    "/gviz/tq?sheet=" +
    encodeURIComponent(SHEET_NAME) +
    "&tqx=out:json;responseHandler=handleSheet";

  script.src = url;
  script.onerror = function(){
    status.textContent = "出店情報を読み込めませんでした。Googleシートの共有設定を確認してください。";
  };

  document.body.appendChild(script);

  setTimeout(function(){
    if(!loaded){
      status.textContent = "読み込みに時間がかかっています。Googleシートの公開設定を確認してください。";
    }
  },8000);
}

loadSheet();
</script>
</body>
</html>
