<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>志木Go map｜出店情報</title>
<meta name="description" content="志木市のキッチンカー出店情報をお届けします。">
<meta property="og:title" content="志木Go map｜出店情報">
<meta property="og:description" content="志木市のキッチンカー出店情報をお届けします。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=2600">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#eef6ff;color:#263241;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Yu Gothic UI",sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:14px 12px 40px}
.header{background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.08);margin-bottom:18px}
.banner{width:100%;display:block}
.header-body{text-align:center;padding:20px 16px 24px}
h1{margin:0 0 12px;color:#0b5fb3;font-size:42px;line-height:1.18;font-weight:900}
.lead{margin:0;font-size:22px;line-height:1.65;font-weight:900;color:#607080}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
.tabs button{min-height:62px;border:none;border-radius:999px;background:#dbeeff;color:#0b5fb3;font-size:22px;font-weight:900;font-family:inherit}
.tabs button.active{background:#0b74de;color:#fff}
.notice{background:#fff;border-radius:22px;padding:20px 16px;margin-bottom:18px;text-align:center;font-size:20px;line-height:1.65;font-weight:900;box-shadow:0 6px 16px rgba(0,0,0,.06)}
.card{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 7px 18px rgba(0,0,0,.08);border-top:6px solid #0b5fb3;margin-bottom:20px}
.media{width:100%;background:#111;color:white;text-align:center}
.media img{width:100%;display:block}
.youtube-box{padding:18px}
.youtube-thumb{width:100%;border-radius:14px;margin-bottom:12px}
.body{padding:20px 18px 22px}
.time{font-size:15px;color:#888;font-weight:800}
.name{margin:8px 0 10px;font-size:30px;line-height:1.3;font-weight:900;color:#0b5fb3;word-break:break-word}
.place{background:#fff3e0;color:#e65100;padding:8px 13px;border-radius:8px;font-size:18px;font-weight:900;display:inline-block;margin-bottom:14px;word-break:break-word}
.msg{font-size:19px;line-height:1.8;white-space:pre-wrap;margin:0 0 16px;word-break:break-word}
.btn{display:block;width:100%;text-align:center;padding:15px 10px;border-radius:10px;text-decoration:none;font-weight:900;background:#0b5fb3;color:#fff;border:none;font-size:18px;font-family:inherit;margin-top:10px}
.youtube-btn{background:#ff0000}
.map-btn{background:#00a36c}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.share-btn{display:flex;align-items:center;justify-content:center;min-height:52px;border-radius:10px;text-decoration:none;font-weight:900;font-size:16px;border:none;cursor:pointer;color:#fff;text-align:center;padding:10px;font-family:inherit}
.share-copy{background:#666}.share-fb{background:#1877f2}.share-line{background:#06c755}.share-x{background:#111}
.loading{text-align:center;padding:30px 12px;color:#777;font-size:20px;font-weight:900}
.home{display:block;text-align:center;margin-top:16px;padding:18px 12px;border-radius:999px;background:#607d8b;color:#fff;text-decoration:none;font-weight:900;font-size:19px}
</style>
</head>
<body>
<div class="wrap">
  <section class="header">
    <img class="banner" src="https://ichirohns-jpg.github.io/shiki.gomap-001/gomap-ogp.jpg?v=2600" alt="志木Go map">
    <div class="header-body">
      <h1>志木Go map</h1>
      <p class="lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>
    </div>
  </section>

  <div class="tabs">
    <button id="latestBtn" class="active" onclick="showLatest()">最新情報</button>
    <button id="archiveBtn" onclick="showArchive()">アーカイブ</button>
  </div>

  <div class="notice" id="notice">新しい出店情報から順番に表示します。</div>
  <div id="list"><div class="loading">出店情報を読み込んでいます...</div></div>
  <a class="home" href="index.html?v=2600">← トップに戻る</a>
</div>

<script>
const SHEET_ID='12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw';
const SHEET_NAME='公開用';
const SHARE_URL='https://ichirohns-jpg.github.io/shiki.gomap-001/';
const MAIN_COUNT=5;
let all=[];
let isArchive=false;

window.handleSheet=function(json){
  try{
    const rows=json.table.rows || [];
    all=rows.map(r=>{
      const c=r.c || [];
      const date=get(c[0]);
      const name=get(c[1]);
      const place=get(c[2]);
      const msg=get(c[3]);
      const media=get(c[4]);
      const map=get(c[8]);
      const status=get(c[9]);
      const sort=get(c[10]);
      return {
        date,name,place,msg,media,map,status,
        sort:Number(sort)||parseDate(date)||0
      };
    }).filter(x=>{
      if(!x.name) return false;
      if(x.status && x.status!=='公開') return false;
      const t=(x.name+x.place+x.msg+x.media);
      if(t.includes('Safariで開いたページ')) return false;
      if(t.includes('ホーム画面に追加')) return false;
      if(t.includes('CsCl68YL36o')) return false;
      return true;
    });

    all.sort((a,b)=>b.sort-a.sort);
    showLatest();
  }catch(e){
    document.getElementById('list').innerHTML='<div class="loading">読み込みに失敗しました</div>';
  }
};

function get(cell){
  if(!cell) return '';
  if(cell.f!==undefined && cell.f!==null) return String(cell.f).trim();
  if(cell.v!==undefined && cell.v!==null) return String(cell.v).trim();
  return '';
}

function parseDate(s){
  const d=Date.parse(String(s).replace(/[年月]/g,'/').replace(/日/g,' '));
  return isNaN(d)?0:d;
}

function showLatest(){
  isArchive=false;
  document.getElementById('latestBtn').classList.add('active');
  document.getElementById('archiveBtn').classList.remove('active');
  document.getElementById('notice').textContent='新しい出店情報から順番に表示します。';
  render(all.slice(0,MAIN_COUNT));
}

function showArchive(){
  isArchive=true;
  document.getElementById('latestBtn').classList.remove('active');
  document.getElementById('archiveBtn').classList.add('active');
  document.getElementById('notice').textContent='アーカイブを表示しています。';
  render(all.slice(MAIN_COUNT));
}

function render(items){
  const list=document.getElementById('list');
  if(!items.length){
    list.innerHTML='<div class="loading">表示できる出店情報はありません。</div>';
    return;
  }
  list.innerHTML=items.map(card).join('');
}

function card(d){
  return `
  <article class="card">
    ${mediaHtml(d.media)}
    <div class="body">
      <div class="time">${esc(d.date)}</div>
      <div class="name">${esc(d.name)}</div>
      <div class="place">📍 ${esc(d.place)}</div>
      <div class="msg">${esc(d.msg)}</div>
      ${d.map ? `<a class="btn map-btn" href="${esc(d.map)}" target="_blank">Googleマップを見る</a>` : ''}
      ${shareHtml(d)}
    </div>
  </article>`;
}

function mediaHtml(url){
  url=String(url||'').trim();
  if(!url) return '';
  const id=youtubeId(url);
  if(id){
    return `<div class="media"><div class="youtube-box">
      <img class="youtube-thumb" src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
      <a class="btn youtube-btn" href="https://www.youtube.com/watch?v=${id}" target="_blank">YouTubeで動画を見る</a>
    </div></div>`;
  }
  if(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(url)){
    return `<div class="media"><img src="${esc(url)}"></div>`;
  }
  return '';
}

function youtubeId(s){
  s=String(s||'');
  let m=s.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m=s.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m=s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  return '';
}

function shareHtml(d){
  const text=`🚚 志木Go map\n${d.name}\n${d.place ? '場所：'+d.place+'\n' : ''}${d.msg}\n${SHARE_URL}`;
  const enc=encodeURIComponent(text);
  return `<div class="share-grid">
    <button class="share-btn share-copy" onclick="copyText(decodeURIComponent('${enc}'))">URLコピー</button>
    <a class="share-btn share-fb" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SHARE_URL)}" target="_blank">Facebook</a>
    <a class="share-btn share-line" href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(SHARE_URL)}" target="_blank">LINE</a>
    <a class="share-btn share-x" href="https://twitter.com/intent/tweet?text=${encodeURIComponent('🚚 志木Go map｜'+d.name)}&url=${encodeURIComponent(SHARE_URL)}" target="_blank">X</a>
  </div>`;
}

function copyText(text){
  const t=document.createElement('textarea');
  t.value=text;
  document.body.appendChild(t);
  t.select();
  document.execCommand('copy');
  document.body.removeChild(t);
  alert('コピーしました');
}

function esc(s){
  return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

(function load(){
  const sc=document.createElement('script');
  sc.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=out:json;responseHandler=handleSheet&v='+Date.now();
  sc.onerror=function(){
    document.getElementById('list').innerHTML='<div class="loading">Googleシートを公開設定にしてください。</div>';
  };
  document.body.appendChild(sc);
})();
</script>
</body>
</html>
