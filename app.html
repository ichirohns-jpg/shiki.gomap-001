  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f2f5f8;
      overflow: hidden;
    }

    #appFrame {
      width: 100%;
      height: 100dvh;
      border: none;
      display: block;
      background: #f2f5f8;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 18px;
      font-weight: bold;
      color: #456;
      background: #f2f5f8;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">読み込み中...</div>

  <iframe
    id="appFrame"
    title="志木Go map"
    src="https://script.google.com/macros/s/AKfycbzAiRzzfUdS3z9HLnH6pcp1PhdsozCUqjYHdMJiYGCG2evGy-Ptt-1WrWGWvrcRsFl5/exec"
    allow="geolocation; camera; microphone; clipboard-read; clipboard-write; fullscreen">
  </iframe>

  <script>
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    frame.onload = function() {
      loading.style.display = "none";
    };

    setTimeout(function() {
      loading.style.display = "none";
    }, 8000);
  </script>
</body>
</html>
