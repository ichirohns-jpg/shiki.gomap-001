<style>

<body>
<div class="wrap">

  <section class="header">
    <img class="banner" src="gomap-ogp.jpg?v=2000" alt="志木Go map">
    <div class="header-body">
      <h1>志木Go map</h1>
      <p class="lead">キッチンカーの出店情報を<br>リアルタイムでお届けします</p>

      <div class="header-actions">
        <button class="blue" type="button" onclick="showLatest()">最新情報</button>
        <a class="orange" href="owner.html">出店希望者はこちら</a>
      </div>
    </div>
  </section>

  <div class="tabs">
    <button id="latestBtn" class="active" type="button" onclick="showLatest()">最新情報</button>
    <button id="archiveBtn" type="button" onclick="showArchive()">アーカイブ</button>
  </div>

  <div class="notice" id="notice">新しい出店情報から順番に表示します。</div>

  <div id="list">
    <div class="loading">出店情報を読み込んでいます...</div>
  </div>

  <div id="bottom-actions" class="bottom-actions">
    <button onclick="copySiteUrl()" class="bottom-btn copy-btn">URLコピー</button>
    <button id="bottomArchiveBtn" onclick="toggleArchive()" class="bottom-btn archive-btn">アーカイブ</button>
  </div>

  <a class="home" href="index.html?v=2000">← トップに戻る</a>
  <div class="footer">Shiki Go map</div>

</div>

<script>
const SHEET_ID = '12pq1Flwl_Ol61frvAMhdFkpDzoTdGsnnzystje8jEXw';
const SHEET_NAMES = ['シート1','投稿データ','公開用'];
const SHARE_URL = 'https://ichirohns-jpg.github.io/shiki.gomap-001/';
const MAIN_COUNT = 5;
const PAGE_SIZE = 5;
const MAX_MEDIA = 5;

let all = [];
let visible = [];
let idx = 0;
let isArchive = false;
let loadingLock = false;
let sheetIndex = 0;
let loaded = false;

function getCell(cell){
  if(!cell) return '';
  if(cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if(cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return '';
}

function normalizeUrl(url){
  return String(url || '')
    .replace(/\\u003d/g,'=')
    .replace(/\\u0026/g,'&')
    .replace(/\\\//g,'/')
    .replace(/&amp;/g,'&')
    .replace(/[),.。]+$/g,'')
    .trim();
}

function collectUrls(text){
  const s = String(text || '');
  const m = s.match(/https?:\/\/[^\s"'<>　]+/g);
  return (m || []).map(normalizeUrl);
}

function parseMediaList(value){
  const s = String(value || '').trim();
  if(!s) return [];

  try{
    const arr = JSON.parse(s);
    if(Array.isArray(arr)){
      return arr.slice(0, MAX_MEDIA).map(normalizeMediaItem).filter(function(x){
        return x && x.url;
      });
    }
  }catch(e){}

  const urls = collectUrls(s);
  const targets = urls.length ? urls : [s];
  const media = [];

  targets.forEach(function(target){
    if(media.length >= MAX_MEDIA) return;

    target = String(target || '').trim();
    if(!target) return;

    const youtubeId = extractYouTubeId(target);
    if(youtubeId){
      media.push({
        type:'youtube',
        url:makeYouTubeEmbedUrl(youtubeId)
      });
      return;
    }

    if(/youtube\.com\/embed/i.test(target)){
      media.push({type:'youtube',url:target});
      return;
    }

    if(/drive\.google\.com\/thumbnail/i.test(target)){
      media.push({type:'image',url:target});
      return;
    }

    if(/drive\.google\.com\/file\/d\//i.test(target)){
      media.push({type:'driveVideo',url:toDrivePreviewUrl(target)});
      return;
    }

    if(/[?&]id=([a-zA-Z0-9_-]+)/.test(target) && /drive\.google\.com/i.test(target)){
      media.push({type:'driveVideo',url:toDrivePreviewUrl(target)});
      return;
    }

    if(/\.(mp4|mov|webm|m4v)(\?.*)?$/i.test(target)){
      media.push({type:'video',url:target});
      return;
    }

    if(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(target)){
      media.push({type:'image',url:target});
      return;
    }
  });

  return media;
}

function normalizeMediaItem(x){
  const type = String(x && x.type ? x.type : '').trim();
  const url = String(x && x.url ? x.url : '').trim();
  if(!url) return null;

  const youtubeId = extractYouTubeId(url);
  if(youtubeId){
    return {type:'youtube',url:makeYouTubeEmbedUrl(youtubeId)};
  }

  if(type === 'youtube') return {type:'youtube',url:url};
  if(type === 'driveVideo') return {type:'driveVideo',url:toDrivePreviewUrl(url)};
  if(type === 'video') return {type:'video',url:url};

  if(/drive\.google\.com\/file\/d\//i.test(url)){
    return {type:'driveVideo',url:toDrivePreviewUrl(url)};
  }

  return {type:type || 'image',url:url};
}

function extractYouTubeId(text){
  const s = String(text || '');

  let m = s.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/);
  if(m) return m[1];

  m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if(m) return m[1];

  m = s.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if(m) return m[1];

  m = s.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if(m) return m[1];

  return '';
}

function makeYouTubeEmbedUrl(id){
  return 'https://www.youtube.com/embed/' + id + '?playsinline=1&mute=1&loop=1&playlist=' + id;
}

function toDrivePreviewUrl(url){
  const s = String(url || '');

  let m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m){
    return 'https://drive.google.com/file/d/' + m[1] + '/preview';
  }

  m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m){
    return 'https://drive.google.com/file/d/' + m[1] + '/preview';
  }

  return s;
}

function parseDateValue(text){
  if(!text) return 0;

  const t = String(text);

  const gviz = t.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(gviz){
    const y = Number(gviz[1]);
    const m = Number(gviz[2]);
    const d = Number(gviz[3]);
    const hh = Number(gviz[4] || 0);
    const mm = Number(gviz[5] || 0);
    const ss = Number(gviz[6] || 0);
    return new Date(y,m,d,hh,mm,ss).getTime();
  }

  const clean = t.replace(/[年月]/g,'/').replace(/日/g,' ').replace(/\./g,'/').trim();
  const d = Date.parse(clean);
  if(!isNaN(d)) return d;

  return 0;
}

function handleSheet(json){
  loaded = true;

  try{
    const rows = json && json.table && json.table.rows ? json.table.rows : [];

    all = rows.map(function(r,index){
      const c = r.c || [];
      const dateText = getCell(c[0]);
      const name = getCell(c[1]);
      const place = getCell(c[2]);
      const msg = getCell(c[3]);
      const mediaCell = getCell(c[4]);
      const map = getCell(c[6]);

      let media = parseMediaList(mediaCell);
      if(!media || media.length === 0){
        media = parseMediaList(msg);
      }

      return {
        time:dateText,
        timeMs:parseDateValue(dateText),
        name:name,
        place:place,
        msg:msg,
        media:media,
        map:map
      };
    }).filter(function(r){
      return r.name !== '';
    });

    all.sort(function(a,b){
      return (b.timeMs || 0) - (a.timeMs || 0);
    });

    showLatest();

  }catch(e){
    document.getElementById('list').innerHTML =
      '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">読み込みに失敗しました</p>';
  }
}

function loadSheet(){
  const script = document.createElement('script');
  const sheetName = SHEET_NAMES[sheetIndex];

  script.src =
    'https://docs.google.com/spreadsheets/d/' +
    encodeURIComponent(SHEET_ID) +
    '/gviz/tq?sheet=' +
    encodeURIComponent(sheetName) +
    '&tqx=out:json;responseHandler=handleSheet&v=' +
    Date.now();

  script.onerror = function(){
    sheetIndex++;
    if(sheetIndex < SHEET_NAMES.length){
      loadSheet();
    }
  };

  document.body.appendChild(script);

  setTimeout(function(){
    if(!loaded && sheetIndex < SHEET_NAMES.length - 1){
      sheetIndex++;
      loadSheet();
    }
  },4000);
}

function showLatest(){
  isArchive = false;
  idx = 0;
  visible = all.slice(0, MAIN_COUNT);

  document.getElementById('latestBtn').classList.add('active');
  document.getElementById('archiveBtn').classList.remove('active');
  document.getElementById('notice').textContent = '新しい出店情報から順番に表示します。';
  document.getElementById('bottomArchiveBtn').textContent = 'アーカイブ';

  document.getElementById('list').innerHTML = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('bottom-actions').style.display = 'none';

  render();
}

function showArchive(){
  isArchive = true;
  idx = 0;
  visible = all.slice(MAIN_COUNT);

  document.getElementById('latestBtn').classList.remove('active');
  document.getElementById('archiveBtn').classList.add('active');
  document.getElementById('notice').textContent = 'アーカイブを表示しています。';
  document.getElementById('bottomArchiveBtn').textContent = '最新に戻る';

  document.getElementById('list').innerHTML = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('bottom-actions').style.display = 'none';

  render();
}

function toggleArchive(){
  if(isArchive){
    showLatest();
  }else{
    showArchive();
  }
}

function render(){
  if(idx >= visible.length){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('bottom-actions').style.display = 'grid';
    return;
  }

  const list = document.getElementById('list');
  const batch = visible.slice(idx, idx + PAGE_SIZE);

  batch.forEach(function(d){
    const div = document.createElement('div');
    div.className = 'card';

    let mH = '';

    if(d.media && d.media.length){
      mH += '<div class="media">';

      d.media.forEach(function(m){
        mH += '<div class="media-slide">';

        if(m.type === 'youtube' || m.type === 'driveVideo'){
          mH += '<iframe src="' + escAttr(m.url) + '" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
        }else if(m.type === 'video'){
          mH += '<video src="' + escAttr(m.url) + '" controls muted playsinline></video>';
        }else{
          mH += '<img src="' + escAttr(m.url) + '" loading="lazy">';
        }

        mH += '</div>';
      });

      mH += '</div>';
    }

    div.innerHTML =
      mH +
      '<div class="body">' +
        '<div class="time">' + esc(d.time) + '</div>' +
        '<div class="name">' + esc(d.name) + '</div>' +
        '<div class="place">📍 ' + esc(d.place) + '</div>' +
        '<div class="msg">' + esc(d.msg) + '</div>' +
        (d.map ? '<a href="' + escAttr(d.map) + '" class="btn map-btn" target="_blank" rel="noopener noreferrer">Googleマップを見る</a>' : '') +
        makeCardShareButtons(d) +
      '</div>';

    list.appendChild(div);
  });

  idx += PAGE_SIZE;

  if(idx >= visible.length){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('bottom-actions').style.display = 'grid';
  }
}

function makeCardShareButtons(d){
  const title = d.name || '志木Go map';
  const place = d.place || '';
  const msg = d.msg || '';

  const shareText =
    '🚚 志木Go map\\n' +
    title + '\\n' +
    (place ? '場所：' + place + '\\n' : '') +
    (msg ? msg + '\\n' : '') +
    SHARE_URL;

  const encodedText = encodeURIComponent(shareText);

  const fbUrl =
    'https://www.facebook.com/sharer/sharer.php?u=' +
    encodeURIComponent(SHARE_URL);

  const lineUrl =
    'https://social-plugins.line.me/lineit/share?url=' +
    encodeURIComponent(SHARE_URL);

  const xUrl =
    'https://twitter.com/intent/tweet?text=' +
    encodeURIComponent('🚚 志木Go map｜' + title) +
    '&url=' +
    encodeURIComponent(SHARE_URL);

  return '' +
    '<div class="share-grid">' +
      '<button class="share-btn share-copy" type="button" onclick="copyEncoded(\\'' + encodedText + '\\')">URLコピー</button>' +
      '<a class="share-btn share-fb" href="' + escAttr(fbUrl) + '" target="_blank" rel="noopener noreferrer">Facebook</a>' +
      '<a class="share-btn share-line" href="' + escAttr(lineUrl) + '" target="_blank" rel="noopener noreferrer">LINE</a>' +
      '<a class="share-btn share-x" href="' + escAttr(xUrl) + '" target="_blank" rel="noopener noreferrer">X</a>' +
    '</div>';
}

function copyEncoded(encodedText){
  const text = decodeURIComponent(encodedText);
  copyText(text, '紹介文とリンクをコピーしました！');
}

function copySiteUrl(){
  const shareText =
    '🚚 志木Go map\\n' +
    '志木市のキッチンカーは今どこ？今日のご飯が見つかるリアルタイム地図。\\n' +
    SHARE_URL;

  copyText(shareText, '紹介文とリンクをコピーしました！');
}

function copyText(text, successMessage){
  const t = document.createElement('textarea');
  t.value = text;
  document.body.appendChild(t);
  t.select();
  t.setSelectionRange(0, 99999);

  try{
    document.execCommand('copy');
    alert(successMessage || 'コピーしました');
  }catch(e){
    prompt('コピーしてシェアしてください：', text);
  }

  document.body.removeChild(t);
}

window.onscroll = function(){
  if(loadingLock) return;

  if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300){
    loadingLock = true;
    render();
    setTimeout(function(){
      loadingLock = false;
    },500);
  }
};

function esc(s){
  return String(s || '').replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m];
  });
}

function escAttr(s){
  return esc(s);
}

loadSheet();
</script>
