<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出店者はこちら | 志木Go map</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
  linear-gradient(180deg,#fff6ef 0%,#ffffff 100%);
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:22px 16px 50px;
}

.card{
  background:#fff;
  border-radius:32px;
  overflow:hidden;
  box-shadow:
  0 10px 28px rgba(20,70,120,.12);
}

.hero{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

.body{
  padding:28px 22px 32px;
}

.title{
  margin:0;
  text-align:center;
  font-size:40px;
  line-height:1.2;
  font-weight:900;
  color:#e46d18;
}

.desc{
  margin-top:18px;
  text-align:center;
  font-size:20px;
  line-height:1.8;
  color:#55697b;
  font-weight:700;
}

.note{
  margin-top:24px;
  background:#fff4ea;
  border-radius:20px;
  padding:18px;
  font-size:17px;
  line-height:1.8;
  color:#7a4d1e;
  font-weight:700;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:74px;
  border-radius:22px;
  text-decoration:none;
  font-size:22px;
  font-weight:900;
  margin-top:26px;
  transition:.2s;
}

.btn:active{
  transform:scale(.98);
}

.open{
  background:
  linear-gradient(135deg,#ff9b2f,#e46d18);
  color:#fff;
  box-shadow:
  0 8px 20px rgba(228,109,24,.24);
}

.back{
  background:
  linear-gradient(135deg,#6c7a89,#34495e);
  color:#fff;
  box-shadow:
  0 8px 20px rgba(52,73,94,.18);
}

.footer{
  text-align:center;
  margin-top:26px;
  font-size:14px;
  color:#789;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="hero"
      src="https://drive.google.com/thumbnail?id=1zcQqzRT2rV9GCW9sk4nISiM1ubH0qQ5U&sz=w2000"
    >

    <div class="body">

      <h1 class="title">
        出店者はこちら
      </h1>

      <div class="desc">
        キッチンカーの出店情報を<br>
        リアルタイムで掲載できます。
      </div>

      <div class="note">
        ・写真は最大5枚まで<br>
        ・動画も掲載可能<br>
        ・Googleマップ対応<br>
        ・掲載無料
      </div>

      <a
        class="btn open"
        href="https://script.google.com/macros/s/AKfycbwO7IcuuA0TveUlsDIsrBUUVk-3e0NPs2bnF3WNBXGBtB9uwZzlqxDtalU1GxPDzDmn/exec?p=s"
      >
        ✍️ 投稿画面を開く
      </a>

      <a
        class="btn back"
        href="https://ichirohns-jpg.github.io/shiki.gomap-001/"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

  <div class="footer">
    Shiki Go map
  </div>

</div>

</body>
</html>
