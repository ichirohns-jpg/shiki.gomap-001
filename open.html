<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志木Go map</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  background:linear-gradient(180deg,#eaf6ff 0%,#ffffff 48%,#fff4e6 100%);
  color:#17324d;
  -webkit-text-size-adjust:100%;
}

.wrap{
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:24px 16px 34px;
}

.hero{
  background:#ffffff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(20,70,120,.18);
}

.hero img{
  width:100%;
  display:block;
}

.card{
  margin-top:18px;
  background:#ffffff;
  border-radius:30px;
  padding:30px 22px 34px;
  text-align:center;
  box-shadow:0 10px 28px rgba(20,70,120,.16);
}

.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  background:#e8f4ff;
  color:#0d63a5;
  font-size:15px;
  font-weight:900;
  margin-bottom:14px;
}

h1{
  margin:0 0 12px;
  font-size:34px;
  line-height:1.25;
  font-weight:900;
  color:#0d4778;
  letter-spacing:.02em;
}

.lead{
  margin:0 0 24px;
  font-size:19px;
  line-height:1.75;
  font-weight:800;
  color:#24445f;
}

.buttons{
  margin-top:8px;
}

.btn{
  display:block;
  width:100%;
  padding:21px 14px;
  border-radius:22px;
  color:#ffffff;
  text-decoration:none;
  font-size:23px;
  font-weight:900;
  margin-top:16px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
}

.view{
  background:linear-gradient(135deg,#1687e0,#0d5fa8);
}

.owner{
  background:linear-gradient(135deg,#ff9b2f,#e46d18);
}

.sub{
  display:block;
  margin-top:8px;
  font-size:14px;
  font-weight:800;
  opacity:.95;
}

.note{
  margin:24px 0 0;
  padding:16px;
  border-radius:18px;
  background:#f6f9fc;
  font-size:15px;
  line-height:1.7;
  color:#526b7f;
  text-align:left;
}

.note strong{
  color:#0d4778;
}

.footer{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#7b8b98;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="hero">
    <img src="gomap-ogp.jpg" alt="志木Go map">
  </div>

  <div class="card">
    <div class="badge">志木市周辺のキッチンカー情報</div>

    <h1>志木Go map</h1>

    <p class="lead">
      見る人も、出店したい人も、<br>
      ここから選べます。
    </p>

    <div class="buttons">

      <a class="btn view" href="https://ichirohns-jpg.github.io/shiki.gomap-001/app.html">
        志木Go mapを見る
        <span class="sub">今日の出店情報・場所を確認する</span>
      </a>

      <a class="btn owner" href="https://docs.google.com/forms/d/12YnOTNzuAxgP_CeLTR5z83NMmkGIh2RkZMNG1RB82Xk/edit?usp=drivesdk">
        出店希望者はこちら
        <span class="sub">掲載・登録フォームを開く</span>
      </a>

    </div>

    <p class="note">
      <strong>一般の方</strong>は「志木Go mapを見る」へ。<br>
      <strong>キッチンカーで出店を希望する方</strong>は「出店希望者はこちら」から登録してください。
    </p>
  </div>

  <div class="footer">
    Shiki Go map
  </div>

</div>
</body>
</html>
