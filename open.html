<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go map 起動ゲート</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #ffffff; color: #333; text-align: center; }
  .msg { margin-bottom: 25px; line-height: 1.6; padding: 0 30px; font-weight: bold; }
  .btn { display: none; width: 85%; max-width: 300px; padding: 22px; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .ios { background: #007aff; }
  .android { background: #4285f4; }
  .small { font-size: 11px; color: #999; margin-top: 20px; }
</style>
</head>
<body>

  <div class="msg">
    外部ブラウザで安全に起動します<br>
    下のボタンをタップしてください
  </div>

  <a id="ios-btn" href="#" class="btn ios">Safariで起動</a>

  <a id="android-btn" href="#" class="btn android">Chromeで起動</a>

<script>
(function() {
  const destination = "https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec";
  const ua = navigator.userAgent.toLowerCase();
  const iosBtn = document.getElementById('ios-btn');
  const andBtn = document.getElementById('android-btn');

  if (/iphone|ipad|ipod/.test(ua)) {
    iosBtn.style.display = 'block';
    // 直接GASではなく、一旦ブラウザを強制起動させる
    iosBtn.href = "ftp://" + destination.replace(/^https?:\/\//, "");
  } 
  else if (/android/.test(ua)) {
    andBtn.style.display = 'block';
    // Chromeパッケージを指定して、FBブラウザを強制離脱
    andBtn.href = "intent://" + destination.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end;";
  } 
  else {
    iosBtn.style.display = 'block';
    iosBtn.innerText = "ブラウザで開く";
    iosBtn.href = destination;
  }
})();
</script>

<div class="small">※正常に開かない場合は、右上のメニューから<br>「ブラウザで開く」を選択してください。</div>

</body>
</html>
