<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Go mapを開く</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
  -webkit-text-size-adjust:100%;
}

.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 36px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:24px 18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(20,70,120,.12);
}

.notice{
  background:#fff3cd;
  color:#000;
  padding:16px 14px;
  border-radius:16px;
  margin-bottom:20px;
  font-weight:900;
  font-size:18px;
  line-height:1.6;
  border:2px solid #ffc107;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:78px;
  border-radius:22px;
  color:#fff;
  font-size:27px;
  font-weight:900;
  text-decoration:none;
  margin:16px 0;
  box-shadow:0 7px 16px rgba(0,0,0,.18);
}

.blue{
  background:linear-gradient(135deg,#2f80ed,#1c73c9);
}

.small{
  margin-top:18px;
  font-size:16px;
  line-height:1.7;
  color:#607488;
  font-weight:700;
}
</style>
</head>

<body>
<div class="page">
  <div class="card">

    <div class="notice">
      Facebookアプリで開いている場合は<br>
      右上の「…」から<br>
      <strong>ブラウザで開く</strong>を選んでください。<br>
      そのあと下のボタンを押してください。
    </div>

    <a class="btn blue"
       href="https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec"
       target="_blank"
       rel="noopener noreferrer">
      Go mapを開く
    </a>

    <div class="small">
      地図が開かない場合は、SafariやChromeでこのページを開いてからお試しください。
    </div>

  </div>
</div>
</body>
</html>
