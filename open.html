<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go map 起動中</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #ffffff; color: #333; }
  .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1877f2; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
  .btn { display: none; margin-top: 20px; padding: 18px 36px; background: #1877f2; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .guide { display: none; margin-top: 30px; font-size: 14px; color: #666; text-align: center; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>アプリを起動中…</p>
</div>

<!-- 手動ボタン：自動遷移がブロックされた時の保険 -->
<a id="manual-btn" class="btn">Go mapを開く</a>

<div id="ios-guide" class="guide">
  ※画面が動かない場合は、右上の「…」から<br><b>「Safariで開く」</b>を選択してください
</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec";

function launch() {
  const ua = navigator.userAgent.toLowerCase();
  
  // 1. Android: IntentでChromeを強制起動（YouTubeと同じ仕組み）
  if (ua.indexOf("android") > -1) {
    const intentUrl = "intent://" + gasUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end;";
    window.location.replace(intentUrl);
  } 
  // 2. iPhone: ブラウザを騙して外に逃がす試行
  else if (ua.indexOf("iphone") > -1 || ua.indexOf("ipad") > -1) {
    // まずは通常遷移を試みる
    window.location.href = gasUrl;
    // FBブラウザ内で固まった時だけ、3秒後にボタンと「Safariで開く」ガイドを出す
    setTimeout(showFallback, 3000);
  } 
  // 3. その他（PC等）
  else {
    window.location.replace(gasUrl);
  }
}

function showFallback() {
  document.getElementById("loading").style.display = "none";
  const btn = document.getElementById("manual-btn");
  btn.href = gasUrl;
  btn.style.display = "block";
  if (navigator.userAgent.toLowerCase().indexOf("iphone") > -1) {
    document.getElementById("ios-guide").style.display = "block";
  }
}

window.onload = launch;
</script>
</body>
</html>
