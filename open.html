<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go map 起動中</title>

<style>
body {
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
  background:#ffffff;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #f3f3f3;
  border-top:4px solid #1877f2;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

.btn {
  display:none;
  margin-top:20px;
  padding:16px 32px;
  background:#1877f2;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Go mapを開いています…</p>
</div>

<!-- 手動ボタン -->
<a id="manual-btn" class="btn">Go mapを開く</a>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec";

function redirect(){

  // 自動遷移
  window.location.replace(gasUrl);

  // 失敗時ボタン表示
  setTimeout(function(){
    document.getElementById("loading").style.display = "none";

    const btn = document.getElementById("manual-btn");
    btn.href = gasUrl;
    btn.style.display = "block";

  },3000);
}

window.onload = redirect;
</script>

</body>
</html>
