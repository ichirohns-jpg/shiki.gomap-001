<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go map 起動</title>
<style>
  :root {
    --primary: #007AFF;
    --bg: #F2F2F7;
    --card-bg: #FFFFFF;
    --text-main: #1C1C1E;
    --text-sub: #8E8E93;
    --danger: #FF3B30;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }
  .card {
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 40px 30px;
    width: 100%;
    max-width: 340px;
    text-align: center;
    transition: all 0.3s ease;
  }
  .icon-container {
    width: 64px;
    height: 64px;
    background: var(--primary);
    border-radius: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
  }
  .icon-container svg {
    width: 32px;
    height: 32px;
    fill: white;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .description {
    font-size: 15px;
    color: var(--text-sub);
    line-height: 1.5;
    margin-bottom: 30px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px 0;
    background: var(--primary);
    color: white;
    text-decoration: none;
    font-size: 17px;
    font-weight: 600;
    border-radius: 14px;
    box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
    transition: transform 0.1s, opacity 0.2s;
    border: none;
    cursor: pointer;
    box-sizing: border-box;
  }
  .btn:active {
    transform: scale(0.96);
    opacity: 0.9;
  }
  .instruction-box {
    background: #FFF0F0;
    border: 1px solid #FFD1D1;
    border-radius: 16px;
    padding: 24px;
    text-align: left;
  }
  .instruction-title {
    color: var(--danger);
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .instruction-text {
    font-size: 15px;
    line-height: 1.8;
    color: #333;
  }
  .bold-highlight {
    font-weight: 700;
    color: #000;
    background: #FFE0E0;
    padding: 2px 6px;
    border-radius: 4px;
  }
</style>
</head>
<body>

  <div class="card" id="app-content">
  </div>

<script>
  const gasUrl = "https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec";
  const ua = navigator.userAgent.toLowerCase();
  const content = document.getElementById('app-content');

  // マップアイコン（SVG）
  const mapIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>';

  // アラートアイコン（SVG）
  const alertIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

  if (ua.indexOf('fbav') > -1 || ua.indexOf('fban') > -1 || ua.indexOf('line') > -1) {
    // Facebook/LINE等のアプリ内ブラウザ用画面
    content.innerHTML = `
      <div class="instruction-box">
        <div class="instruction-title">
          ${alertIcon}
          アプリ内ブラウザでは開けません
        </div>
        <div class="instruction-text">
          右上の <span class="bold-highlight">「･･･」</span> をタップし、<br>
          <span class="bold-highlight">「ブラウザで開く」</span><br>
          を選択して起動してください。
        </div>
      </div>
    `;
  } else {
    // 通常ブラウザ用画面（Safari/Chrome）
    content.innerHTML = `
      <div class="icon-container">
        ${mapIcon}
      </div>
      <div class="title">Go map</div>
      <div class="description">アプリを安全に起動します</div>
      <a href="${gasUrl}" class="btn">地図を開く</a>
    `;
  }
</script>
</body>
</html>
