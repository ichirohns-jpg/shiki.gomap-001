<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go map 起動ゲート</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #ffffff; color: #333; text-align: center; }
  .btn { display: block; width: 85%; max-width: 320px; padding: 22px; color: white; text-decoration: none; border-radius: 16px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .safari { background: #007aff; }
  .chrome { background: #4285f4; }
  .msg { margin-bottom: 30px; line-height: 1.6; padding: 0 20px; }
  .small { font-size: 12px; color: #888; margin-top: 15px; }
</style>
</head>
<body>

  <div class="msg">
    <b>Go mapを起動します</b><br>
    下のボタンを押して外のブラウザで開いてください
  </div>

  <!-- iPhone用ボタン（普段は隠す） -->
  <a id="ios-btn" href="#" class="btn safari" style="display:none;">Safariで起動する</a>

  <!-- Android用ボタン（普段は隠す） -->
  <a id="android-btn" href="#" class="btn chrome" style="display:none;">Chromeで起動する</a>

  <div class="small">※移動後、ホーム画面に保存できます</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbyzAMTakr5jWP-Ygj7H7dCMi4LnHWF73joHITw3DmznYTmL9HRHEWc4YzPIySPTmrzV/exec";
const ua = navigator.userAgent.toLowerCase();

// Android判定
if (/android/.test(ua)) {
  const btn = document.getElementById('android-btn');
  btn.style.display = 'block';
  // IntentスキームでFacebookを強制終了させてChromeで開く（Androidの裏技）
  btn.href = "intent://" + gasUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end;";
} 
// iPhone/iPad判定
else if (/iphone|ipad|ipod/.test(ua)) {
  const btn = document.getElementById('ios-btn');
  btn.style.display = 'block';
  // ftpスキームを使い、FBブラウザを「未対応」と判断させてSafariへバトンタッチさせる（iPhoneの裏技）
  btn.href = "ftp://" + gasUrl.replace(/^https?:\/\//, "");
} 
// その他（PCなど）
else {
  const btn = document.getElementById('android-btn');
  btn.style.display = 'block';
  btn.innerText = "ブラウザで開く";
  btn.href = gasUrl;
}
</script>

</body>
</html>
